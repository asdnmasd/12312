<!DOCTYPE html>
<html lang="zh-CN">
<head>

            width: 6px;
            height: 6px;

            background: #f1f5f9;

            background: #cbd5e1;
            border-radius: 4px;

<body class="bg-slate-50 min-h-screen text-slate-800">

            </div>

        </div>

    <script>
        // 201道全题库无损集成
        const quizData = [
            // 造血器官与造血微环境1 (1-11)
            { q: "胚胎期造血器官生成各种血细胞的先后顺序是", a: ["巨核细胞、粒细胞、红细胞、单核细胞和淋巴细胞", "红细胞、粒细胞、巨核细胞、淋巴细胞和单核细胞", "红细胞、巨核细胞、粒细胞、单核细胞和淋巴细胞", "粒细胞、红细胞、巨核细胞、单核细胞和淋巴细胞", "巨核细胞、红细胞、粒细胞、淋巴细胞和单核细胞"], c: 1, category: "章节测试一：造血器官1", desc: "卵黄囊红系造血最早，随后依次产生粒细胞、巨核细胞、淋巴细胞及单核细胞。" },
            { q: "关于骨髓, 正确的是", a: ["黄骨髓主要由造血细胞组成", "红骨髓主要由脂肪细胞组成", "白骨髓主要为支架细胞", "分为黄骨髓、红骨髓和白骨髓", "黄骨髓具有造血的潜能"], c: 4, category: "章节测试一：造血器官1", desc: "在机体需要造血时，黄骨髓可转化为红骨髓，恢复造血潜能。" },
            { q: "胚胎期造血器官生成原始红细胞的最初形态特点为", a: ["双核型", "巨幼型", "缺铁型", "典型", "变异型"], c: 1, category: "章节测试一：造血器官1", desc: "卵黄囊阶段产生的第一代幼红细胞呈现巨幼样特征。" },
            { q: "下列关于血岛的说法错误的是", a: ["血岛中央部分的细胞为最早的造血干细胞", "血岛周围部分为分化的成熟细胞", "血岛周边部分的间质细胞分化为扁平的内皮细胞,形成最初的血管壁", "在卵黄囊壁上聚集形成的细胞团成为血岛", "血岛是人类最初的造血中心"], c: 1, category: "章节测试一：造血器官1", desc: "血岛周围部分的细胞并非成熟细胞，而是继续分化的血细胞前体。" },
            { q: "关于脾脏造血, 错误的是", a: ["胚胎的脾脏造血也生成淋巴细胞及单核细胞", "至出生后, 脾脏仅产生淋巴细胞", "胚胎的脾脏造血主要生成红细胞、粒细胞及巨核细胞", "脾脏造血约开始于胚胎第5周", "脾脏造血发生在肝脏造血期"], c: 1, category: "章节测试一：造血器官1", desc: "出生后脾脏主要产生淋巴细胞和单核细胞，不能说“仅”产生淋巴细胞。" },
            { q: "不属于胚胎期造血的是", a: ["胸腺造血", "卵黄囊造血", "淋巴器官造血", "肝脏造血", "骨髓造血"], c: 2, category: "章节测试一：造血器官1", desc: "淋巴器官造血（如淋巴结）在胚胎期作用极小，主要由胸腺和脾脏参与。" },
            { q: "关于胚胎期造血, 错误的是", a: ["肝脏造血是由卵黄囊血岛的造血干细胞迁移到肝脏引起的", "胚胎第5个月以后,骨髓成为造血中心", "淋巴结不参与胚胎期造血", "脾脏、胸腺等造血也发生在肝脏造血期", "人体的造血器官起源于中胚层的原始间叶细胞"], c: 2, category: "章节测试一：造血器官1", desc: "淋巴结在胚胎第4个月开始发育，并参与产生淋巴细胞。" },
            { q: "关于骨髓基质细胞, 错误的是", a: ["骨髓基质细胞产生调控造血的生长因子", "基质细胞由纤维细胞、内皮细胞、脂肪细胞等多种细胞组成", "基质细胞是骨髓造血微环境的重要组成部分", "基质细胞分泌的产物与造血细胞的黏附无关", "基质细胞分泌的细胞因子也可作用于基质细胞"], c: 3, category: "章节测试一：造血器官1", desc: "骨髓基质细胞合成的细胞外基质对造血细胞的定位及黏附起着绝对调控作用。" },
            { q: "下列关于中胚叶造血期说法错误的是", a: ["胚胎第6周时,中胚叶造血功能衰退,由肝脏和脾脏取代", "此时期的原始细胞为原红样细胞,分化能力强,可分化发育为成熟红细胞", "在此造血期内,胚胎干细胞分化出造血干细胞", "中胚叶造血期又称卵黄囊造血期", "在此造血期内产生了血红蛋白 Hb-Gowerl、Hb-Gower2 和 Hb-Portland"], c: 1, category: "章节测试一：造血器官1", desc: "中胚叶时期的原红样细胞不能分化为完全成熟的第二、三代红细胞。" },
            { q: "人体的造血器官起源于", a: ["中胚层的原始间质细胞", "外胚层的原始间质细胞", "内胚层的原始间叶细胞", "中胚层的原始间叶细胞", "外胚层的原始间叶细胞"], c: 3, category: "章节测试一：造血器官1", desc: "人体的有生造血系统及骨髓结构起源于中胚层的原始间叶细胞。" },
            { q: "下列关于肝脏造血的说法错误的是", a: ["胚胎3-6个月肝脏是主要的造血场所,主要产生成熟红细胞", "胚胎第4个月后肝脏才生成粒细胞", "此造血期的红细胞为第二代幼红细胞,合成胎儿血红蛋白(HbF)", "卵黄囊血岛产生的造血干细胞迁移至肝脏后增殖形成造血组织灶", "造血时间为人胚胎发育第6周到第7个月"], c: 0, category: "章节测试一：造血器官1", desc: "胚胎3-6个月肝脏主要产生的是有核幼稚红细胞，而非成熟红细胞。" },

            // 造血及造血调控2 (12-21)
            { q: "关于细胞分化说法错误的是", a: ["分化过程可逆", "是血细胞失去某些潜能,又获得某些新功能的过程", "分裂后的子细胞在生物学性状上有新的特点", "分化后的细胞与原来细胞产生了质的不同", "胚胎干细胞分化为造血干细胞"], c: 0, category: "章节测试二：造血调控2", desc: "生理状态下，血细胞的分化过程具有不可逆的单向特征。" },
            { q: "若无骨髓-血屏障,髓外造血会导致外周血出现较多何种细胞?", a: ["幼稚粒细胞、有核红细胞及细胞碎片", "分裂象细胞", "幼稚细胞", "有核红细胞", "原始细胞"], c: 0, category: "章节测试二：造血调控2", desc: "正常存在骨髓-血屏障防止不成熟的幼稚粒细胞及有核红细胞流出。" },
            { q: "关于骨髓微血管系统说法错误的是", a: ["血窦和静脉窦统称为骨髓血窦", "是造血微环境的重要组成部分", "骨髓有丰富的血管系统,包括动脉、静脉、毛细血管等", "毛细血管注入静脉窦,汇聚成集合窦,注入中心静脉", "供给骨髓营养物质"], c: 0, category: "章节测试二：造血调控2", desc: "骨髓血窦特指窦状微血管，不能与普通的静脉窦完全混为一谈。" },
            { q: "属于多倍体细胞的是", a: ["浆细胞", "中性粒细胞", "红细胞", "淋巴细胞", "巨核细胞"], c: 4, category: "章节测试二：造血调控2", desc: "巨核细胞在成熟过程中进行连续核内DNA复制而无胞体分裂，为多倍体细胞。" },
            { q: "关于骨髓间质细胞说法错误的是", a: ["目前的研究尚未发现其特异性CD 标志", "是细胞工程的理想靶细胞", "可分化为成骨细胞、脂肪细胞、心肌细胞等", "具有高度自我更新能力和多向分化潜能", "在体外不能获得,纯化和转染也极其困难"], c: 4, category: "章节测试二：造血调控2", desc: "骨髓间质干细胞(MSC)在体外易于贴壁培养、传代与纯化。" },
            { q: "骨髓中造血细胞分布具有区域性,下列说法正确的是", a: ["淋巴细胞、浆细胞散落在造血细胞之间", "红细胞造血岛位于血窦附近,中心为幼稚红细胞,周围为巨噬细胞", "单核细胞聚集组成淋巴小结散在造血索中", "巨核细胞紧贴血窦壁,通过将细胞质的伪足深入血窦壁缝隙来释放血小板", "粒细胞造血岛远离血窦,粒细胞成熟后可直接进入外周血"], c: 3, category: "章节测试二：造血调控2", desc: "巨核细胞特意定位在窦壁边缘，直接向血窦腔内吐出伪足形成血小板。" },
            { q: "关于淋巴器官造血,下列说法错误的是", a: ["淋巴结由被膜、皮质和髓质组成", "脾实质由红髓、白髓和边缘区组成,是浆细胞的成熟场所", "中枢淋巴器官包括骨髓和胸腺", "胸腺主要功能是产生淋巴细胞和分泌胸腺素", "周围淋巴器官包括脾、淋巴结、黏膜淋巴组织"], c: 1, category: "章节测试二：造血调控2", desc: "浆细胞最终的合成成熟及归巢中心主要在骨髓，而非脾脏。" },
            { q: "关于髓外造血的病理生理特点说法错误的是", a: ["属于机体的正常反应", "造血部位可累及胸腺", "多见于儿童", "是机体对血细胞的需求明显增高的一种代偿", "可导致相应器官的肿大"], c: 0, category: "章节测试二：造血调控2", desc: "髓外造血通常是机体在严重贫血或骨髓功能受损时的病理性代偿表现。" },
            { q: "关于血细胞的发展规律说法正确的是", a: ["所有血细胞的细胞核最后都变成不规则形", "细胞质内的颗粒从有到无", "细胞核由大变小,染色质越来也疏松", "核质比由大到小", "细胞质的嗜碱性越来越强"], c: 3, category: "章节测试二：造血调控2", desc: "随成熟度增加，细胞核体积缩小，核质比从大到小演变。" },
            { q: "关于骨髓中的血窦说法错误的是", a: ["正常情况下有核红细胞能顺利通过血窦壁", "造血活跃时血窦壁空隙增多", "血窦壁对血细胞的释放起调控作用", "绝大部分只有一层内皮细胞构成", "完整的血窦壁由内皮细胞、颗粒状基底膜和外膜网状细胞构成"], c: 0, category: "章节测试二：造血调控2", desc: "正常情况下，只有完全成熟的红细胞能通过血窦孔隙，有核红细胞由于膜僵硬不能通过。" },

            // 血细胞检验技术1 (22-29)
            { q: "胞体小的嗜碱性粒细胞,最易被误认为", a: ["肥大细胞", "中性粒细胞(含中毒颗粒)", "吞噬细胞", "双染性嗜酸性粒细胞", "小淋巴细胞"], c: 4, category: "章节测试三：细胞技术1", desc: "小嗜碱性粒细胞因颗粒深紫黑、分布均匀有时容易被误认为小淋巴细胞。" },
            { q: "不符合早幼粒细胞特点的是", a: ["染色质呈颗粒状", "胞质中有少许特异性颗粒", "可见核仁", "胞体大", "胞核圆形或椭圆形"], c: 1, category: "章节测试三：细胞技术1", desc: "早幼粒细胞胞质中的颗粒是粗大的非特异性天青嗜红颗粒，非特异性颗粒。" },
            { q: "不符合原始红细胞特点的是", a: ["核质比大", "核仁大,界限不清", "染色质呈颗粒状", "胞质呈均匀淡蓝色", "胞体大,可见瘤状突起"], c: 3, category: "章节测试三：细胞技术1", desc: "原始红细胞的胞质通常呈浓墨蓝色或深蓝色，不透明，而非淡蓝色。" },
            { q: "骨髓涂片镜检发现某细胞,核染色质密集,胞核分两叶,其胞质中含有粗大、大小一致、排列紧密的圆形颗粒,初步考虑为", a: ["嗜碱性粒细胞", "巨核细胞", "中性粒细胞", "嗜酸性粒细胞", "早幼粒细胞"], c: 3, category: "章节测试三：细胞技术1", desc: "嗜酸性粒细胞的胞质富含粗大、橘红色、折光性强的特异性嗜酸颗粒。" },
            { q: "胞质呈多色性,见于", a: ["单核细胞", "淋巴细胞", "浆细胞", "中幼红细胞", "早幼粒细胞"], c: 3, category: "章节测试三：细胞技术1", desc: "中幼红细胞因为同时含有碱性RNA和红色的血红蛋白，胞质呈现特征性的多色性/灰蓝色。" },
            { q: "不属于原始细胞特点的是", a: ["胞质蓝色", "有清晰核仁", "核染色质细致", "核质比小", "胞体较大"], c: 3, category: "章节测试三：细胞技术1", desc: "原始细胞一般核占大部分，核质比普遍非常大。" },
            { q: "早幼红细胞与中幼红细胞的划分,最主要的依据是", a: ["胞体大小", "胞核染色质", "胞质特征", "胞核大小", "核质比"], c: 2, category: "章节测试三：细胞技术1", desc: "两者的主分界在胞质颜色，早幼红胞质呈纯蓝色，而中幼红由于血红蛋白合成开始呈蓝灰色（多色性）。" },
            { q: "某细胞胞质中含有大小及形态不一,排列凌乱的深紫红色颗粒,并覆盖胞核上,其胞核、胞质界限不清,核染色质结构不易观察,初步考虑为", a: ["中性粒细胞", "嗜酸性粒细胞", "巨核细胞", "嗜碱性粒细胞", "早幼粒细胞"], c: 3, category: "学术第三章：血细胞检验技术", desc: "嗜碱性颗粒呈紫黑色，大小不一，分布凌乱，常覆盖于核上。" },

            // 血细胞检验技术2 (30-42)
            { q: "被称之为粒细胞酯酶的是", a: ["氯乙酸 AS-D 萘酚酯酶染色", "酸性α-醋酸萘酚酯酶染色", "醋酸 AS-D 萘酚酯酶染色", "a-醋酸萘酚酯酶染色", "α-丁酸萘酚酯酶染色"], c: 1, category: "章节测试四：细胞技术2", desc: "氯乙酸AS-D萘酚酯酶（AS-D NCE）俗称特异性酯酶，是粒细胞的特征性酯酶。" },
            { q: "α-丁酸萘酚酯酶染色多呈阴性或弱阳性,除外", a: ["各期巨核细胞", "分化好的单核细胞", "各期粒细胞", "各期浆细胞", "各期B 淋巴细胞"], c: 1, category: "章节测试四：细胞技术2", desc: "单核细胞含有强阳性的非特异性酯酶，能被NaF明显抑制。" },
            { q: "不符合正常骨髓象特征的是", a: ["骨髓增生活跃", "浆细胞<5%", "嗜碱性粒细胞<1%", "粒红比值(2~4):1", "嗜酸性粒细胞<5%"], c: 1, category: "章节测试四：细胞技术2", desc: "正常骨髓中浆细胞比例非常低，一般不超过 2%。" },
            { q: "正常情况下过碘酸-希夫反应呈阳性,除外", a: ["各期巨核细胞及血小板", "各期粒细胞", "各期有核红细胞及红细胞", "各期单核细胞", "各期淋巴细胞"], c: 2, category: "章节测试四：细胞技术2", desc: "正常情况下，幼红细胞及成熟红细胞的PAS（糖原染色）均为阴性。" },
            { q: "不符合MPO染色结果的是", a: ["巨核细胞和有核红细胞呈阴性", "个别淋巴系细胞呈阳性", "嗜酸性粒细胞阳性最强", "单核系细胞呈阴性或阳性", "各期中性粒细胞均阳性"], c: 1, category: "章节测试四：细胞技术2", desc: "淋巴系细胞过氧化物酶(MPO/POX)染色绝对为阴性。" },
            { q: "MPO 染色时,各期单核细胞可呈阳性,但以哪种为主", a: ["(±)", "(+++)", "(++)", "(++++)", "(+)"], c: 0, category: "章节测试四：细胞技术2", desc: "单核系细胞POX/MPO呈弱阳性或阴性（或极微弱的弱阳性）。" },
            { q: "关于低倍镜观察骨髓涂片,错误的是", a: ["对巨核细胞进行分类", "对巨核细胞进行计数", "观察涂片中是否存在胞体大、成堆的异常细胞", "观察涂片制备情况", "观察染色情况"], c: 0, category: "章节测试四：细胞技术2", desc: "低倍镜下只能进行巨核细胞的计数，其具体的分类和阶段辨认必须在油镜或高倍镜下完成。" },
            { q: "细胞化学染色的结果观察一般在", a: ["细胞器中", "细胞质内", "细胞表面", "细胞核中", "细胞膜上"], c: 1, category: "章节测试四：细胞技术2", desc: "绝大多数化学染色的显色反应、颗粒和阳性区域都在细胞质中观察。" },
            { q: "区分急性白血病细胞类型,临床上首选", a: ["非特异性酯酶染色", "特异性酯酶染色", "苏丹黑染色", "过碘酸-希夫反应", "髓过氧化物酶染色"], c: 4, category: "章节测试四：细胞技术2", desc: "髓过氧化物酶(MPO)染色是鉴别急性粒细胞白血病与急性淋巴细胞白血病的首选标志。" },
            { q: "某患者骨髓中,原始粒细胞5%、早幼粒细胞10%、中性幼稚粒细胞20%、中性粒细胞20%、嗜酸性粒细胞4%、嗜碱性粒细胞1%、淋巴细胞20%、浆细胞2%、单核细胞3%、中幼红细胞10%、晚幼红细胞5%,其粒红比值为", a: ["3.7:1", "2.3:1", "2.0:1", "4.0:1", "4.5:1"], c: 3, category: "章节测试四：细胞技术2", desc: "粒系总和 = 5+10+20+20+4+1 = 60%。红系总和 = 10+5 = 15%。粒/红比 = 60/15 = 4.0:1。" },
            { q: "主要根据哪种细胞的多少来判断骨髓增生程度", a: ["有核细胞", "有核红细胞", "红细胞", "巨核系细胞", "粒系细胞"], c: 0, category: "章节测试四：细胞技术2", desc: "临床上，骨髓增生程度是依靠成熟红细胞与有核细胞的比例来判断的。" },
            { q: "骨髓增生明显活跃,其一个高倍镜视野中有核细胞数为", a: ["150~200个", "&ge;100个", "50~100个", "100~150个", "100~200个"], c: 2, category: "章节测试四：细胞技术2", desc: "骨髓增生明显活跃时，每高倍镜视野（400x）下可见50-100个有核细胞。" },
            { q: "酯酶双染色对诊断哪种疾病具有重要意义", a: ["急性单核细胞白血病(M5)", "急性粒-单核细胞白血病(M4)", "急性粒细胞白血病未分化型(M1)", "急性红白血病(M6)", "急性早幼粒细胞白血病(M3)"], c: 1, category: "章节测试四：细胞技术2", desc: "双酯酶染色可在一张涂片上同时观察粒系和单核系细胞，对确诊急粒单(M4)极具价值。" },

            // 红细胞疾病应用1 (43-52)
            { q: "患者骨髓检查:增生明显活跃,红系占50%;中晚幼红细胞增多为主,体积小,边缘不规则,细胞质偏蓝且量少,该骨髓象提示那种疾病", a: ["巨幼细胞贫血", "溶溶性贫血", "慢性病性贫血", "缺铁性贫血", "再生障碍性贫血"], c: 3, category: "章节测试五：红细胞疾病1", desc: "幼红细胞体积小、浆量少、边缘不整、核老浆幼，是典型的缺铁性贫血骨髓表现。" },
            { q: "正细胞性贫血查找原因,首选什么检查", a: ["血常规", "骨髓形态学", "网织红细胞", "骨髓活检", "血红蛋白"], c: 2, category: "章节测试五：红细胞疾病1", desc: "网织红细胞(Ret)水平是判断溶血性/失血性（增高）还是造血低下（减低）的关键过筛试验。" },
            { q: "成年人铁缺乏的最常见原因是", a: ["慢性失血", "偏食", "慢性胃炎", "吸收障碍", "肝炎"], c: 0, category: "章节测试五：红细胞疾病1", desc: "成年人（尤其是男性及绝经后女性）最常见的缺铁病因是痔疮、溃疡等引起的消化道慢性失血。" },
            { q: "患者女,血常规检查:Hb 85g/L, RBC 3X10^12/L,直方图显示峰左移,MCV 75fl,血小板 552×10^9/L首先考虑", a: ["失血性贫血", "溶血性贫血", "缺铁性贫血", "原发性血小板增多症", "巨幼细胞贫血"], c: 2, category: "章节测试五：红细胞疾病1", desc: "小细胞低色素贫血（MCV 75fl）伴血小板反应性增高，常为典型的缺铁性贫血特点。" },
            { q: "诊断贫血的可靠指标是", a: ["外周红细胞数量", "皮肤颜色改变", "红细胞分布宽度", "外周血血红蛋白含量", "外周平均血红蛋白浓度"], c: 3, category: "章节测试五：红细胞疾病1", desc: "血红蛋白(Hb)量是临床诊断及衡量贫血严重程度的最公认指标。" },
            { q: "下列不属于小细胞性贫血的是", a: ["溶血性贫血", "铁粒幼细胞贫血", "珠蛋白生成障碍性贫血", "再生障碍性贫血", "缺铁性贫血"], c: 3, category: "章节测试五：红细胞疾病1", desc: "再生障碍性贫血属于正细胞正色素性贫血。" },
            { q: "关于储存铁缺乏阶段说法错误的是", a: ["血红蛋白下降", "红细胞数量正常", "血清铁蛋白下降", "红细胞形态未见明显异常", "骨髓铁减少"], c: 0, category: "章节测试五：红细胞疾病1", desc: "在缺铁的第一阶段（储存铁缺乏/ID期），仅有铁蛋白(SF)下降，血红蛋白尚未发生下降。" },
            { q: "不属于贫血的一般临床表现的是", a: ["头晕", "乏力", "急躁", "脸色苍白", "心悸"], c: 2, category: "章节测试五：红细胞疾病1", desc: "急躁并非贫血的典型病理表现，头晕、苍白、心悸均属于常见的一般症状。" },
            { q: "关于缺铁性贫血的实验室检查结果,错误的是", a: ["血清铁蛋白增加", "血清铁下降", "血清转铁蛋白饱和度下降", "血清总铁结合力增加", "血清转铁蛋白增加"], c: 0, category: "章节测试五：红细胞疾病1", desc: "缺铁性贫血时体内铁储量耗竭，血清铁蛋白(SF)应该显著下降而非升高。" },
            { q: "患者女,因头晕,乏力近一年入院治疗,实验室检查血红蛋白浓度为35g/L,骨髓铁染色显示,骨髓中可见铁小块(++),根据以上信息可排除那种疾病", a: ["再生障碍性贫血", "缺铁性贫血", "巨幼细胞贫血", "溶血性贫血", "急性失血"], c: 1, category: "章节测试五：红细胞疾病1", desc: "铁染色显示骨髓有细胞外铁(++)，说明体内铁储备充足，绝非缺铁性贫血。" },

            // 红细胞疾病2 (53-63)
            { q: "对再障具有诊断价值的检查是", a: ["骨髓活检", "网织红细胞计数", "细胞化学染色", "骨髓形态学检验", "血常规检查"], c: 0, category: "章节测试六：红细胞疾病2", desc: "骨髓活检可观察骨髓小粒的脂肪化程度及非造血细胞增高，是确诊再障的关键指标。" },

            { q: "关于重型再障说法错误的是", a: ["涂片油滴增多", "淋巴细胞,浆细胞,肥大细胞等非造血细胞增多", "骨髓小粒呈空网状", "骨髓多数增生减低或极度减低,少数部位增生活跃", "粒,红,巨核系细胞明显减少"], c: 3, category: "章节测试六：红细胞疾病2", desc: "重型再障(SAA)骨髓全线极度低下，非重型再障(NSAA)才可能表现为灶性多增生或部分活跃。" },
            { q: "关于非重型再障说法正确的是", a: ["非造血细胞比例正常", "骨髓增生均减低", "粒系以幼稚细胞为主", "巨核细胞明显减少", "红系均减少"], c: 3, category: "章节测试六：红细胞疾病2", desc: "不论是何种再障，巨核细胞全线缺如/极度减少是统一的核心特征。" },
            { q: "关于再生障碍性贫血的临床表现说法错误的是", a: ["主要表现为贫血,出血及感染", "少数 NSAA可进展为SAA", "分为重型再障和非重型再障", "常伴肝脾肿大,罕见淋巴结肿大", "重型再障起病急,进展快"], c: 3, category: "章节测试六：红细胞疾病2", desc: "再生障碍性贫血极罕见伴发肝脾、淋巴结肿大，若有肿大提示其他血液肿瘤。" },
            { q: "不属于重型再障血象特点的是", a: ["淋巴细胞比例>60%", "血小板<20X10^9/L", "网织红细胞常<0.5%", "中性粒细胞<0.5×10^9/L", "网织红细胞绝对值<15X10^9/L"], c: 0, category: "章节测试六：红细胞疾病2", desc: "淋巴细胞比例增高虽然是再障的特征，但通常不是重型再障诊断的刚性数值指标。" },

            { q: "骨髓中可见巨大原始红细胞是哪种疾病的突出特点", a: ["缺铁性贫血", "再障危象", "巨幼细胞贫血", "纯红再障", "骨髓增生异常综合征"], c: 1, category: "章节测试六：红细胞疾病2", desc: "急性造血停滞（再障危象）常伴发微小病毒B19感染，骨髓中特异性出现巨大原始红细胞。" },
            { q: "除下列哪种疾病以外,外周血图片可出现有核红细胞", a: ["缺铁性贫血", "再生障碍性贫血", "急性失血性贫血", "巨幼细胞贫血", "恶性肿瘤骨髓转移"], c: 1, category: "章节测试六：红细胞疾病2", desc: "再生障碍性贫血由于骨髓红系极度受抑，外周血中极罕见出现有核红细胞。" },
            { q: "再障应注意与以下疾病鉴别,哪项除外", a: ["骨髓增生异常综合征", "阵发性睡眠性血红蛋白尿", "骨髓转移癌", "免疫性血小板减少症", "急性造血功能停滞"], c: 3, category: "章节测试六：红细胞疾病2", desc: "免疫性血小板减少症(ITP)仅有血小板一系减低，不伴发全血细胞减少，临床一般不需要与再障混淆。" },
            { q: "再障与阵发性睡眠性血红蛋白尿症最主要的鉴别点是", a: ["是否骨髓增生减低", "是否有血小板减少", "是否全血细胞减少", "是否 ham 试验阳性", "冷凝集素实验是否阳性"], c: 3, category: "章节测试六：红细胞疾病2", desc: "Ham试验（酸溶血试验）阳性是PNH的特征性确证标志，再障为阴性。" },

                    renderListQuestions();
                }
            } else {
                document.getElementById(`btn-chap-${idx}`).className = "w-full text-left p-2.5 rounded-xl text-[11px] font-bold flex justify-between items-center bg-blue-50 text-blue-800 border border-blue-200 transition-all";
                const firstIdx = quizData.findIndex(q => q.category === chap);
                if (firstIdx !== -1) {
                    if (currentMode === 'single') {
                        currentIdx = firstIdx;
                        renderSingleQuestion();
                    } else {
                        renderListQuestions(chap);
                    }
                }
            }
        }

        // 渲染单题
        function renderSingleQuestion() {
            const activeList = getActiveList();
            if (activeList.length === 0) {
                document.getElementById('single-question-text').innerText = "当前没有符合条件的题目";
                document.getElementById('single-options-container').innerHTML = '';
                document.getElementById('single-fill-container').innerHTML = '';
                document.getElementById('single-index').innerText = `0 / 0`;
                document.getElementById('single-analysis').classList.add('hidden');
                return;
            }

            if (currentIdx >= activeList.length) currentIdx = activeList.length - 1;
            if (currentIdx < 0) currentIdx = 0;

            const qIdx = activeList[currentIdx];
            const item = quizData[qIdx];

            document.getElementById('single-chapter-tag').innerText = item.category;
            document.getElementById('single-index').innerText = `第 ${currentIdx + 1} / ${activeList.length} 题`;
            document.getElementById('single-question-text').innerText = item.q;

            const optionsContainer = document.getElementById('single-options-container');
            const fillContainer = document.getElementById('single-fill-container');

            if (item.type === 'fill') {
                // 渲染填空题输入框
                optionsContainer.classList.add('hidden');
                fillContainer.classList.remove('hidden');
                renderFillInputs(qIdx, fillContainer);
            } else {
                // 渲染普通选择题选项
                optionsContainer.classList.remove('hidden');
                fillContainer.classList.add('hidden');
                renderChoiceOptions(qIdx, optionsContainer);
            }
        }

        // 选择题渲染核心
        function renderChoiceOptions(qIdx, container) {
            container.innerHTML = '';
            const item = quizData[qIdx];
            const isAnswered = answeredState[qIdx] !== undefined;

            item.a.forEach((opt, aIdx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn block w-full text-left p-4 border border-slate-200 rounded-2xl hover:bg-slate-50 hover:border-slate-300 font-medium text-slate-700 transition text-sm md:text-base";
                btn.innerHTML = `<span class="inline-block w-7 h-7 leading-7 text-center rounded-lg bg-slate-100 text-slate-500 font-bold mr-3 text-xs">${String.fromCharCode(65+aIdx)}</span>${opt}`;
                
                if (isAnswered) {
                    btn.disabled = true;
                    if (aIdx === item.c) {
                        btn.classList.add('correct');
                    } else if (aIdx === answeredState[qIdx]) {
                        btn.classList.add('wrong');
                    }
                } else {
                    btn.onclick = () => {
                        answeredState[qIdx] = aIdx;
                        if (aIdx !== item.c) {
                            if (!wrongList.includes(qIdx)) wrongList.push(qIdx);
                        }
                        renderSingleQuestion();
                        updateStats();
                    };
                }
                container.appendChild(btn);
            });

            // 渲染考点分析
            const analysis = document.getElementById('single-analysis');
            if (isAnswered) {
                analysis.classList.remove('hidden');
                document.getElementById('single-analysis-text').innerText = item.desc || "考点分析收录中。";
            } else {
                analysis.classList.add('hidden');
            }
        }

        // 填空题渲染核心
        function renderFillInputs(qIdx, container) {
            container.innerHTML = '';
            const item = quizData[qIdx];
            const savedAnswers = fillState[qIdx] || new Array(item.blanks.length).fill('');
            const isChecked = wrongList.includes(qIdx) || savedAnswers.every((ans, idx) => checkFillAnswer(ans, item.blanks[idx]));

            item.blanks.forEach((blank, bIdx) => {
                const div = document.createElement('div');
                div.className = "flex flex-col md:flex-row md:items-center gap-3 p-3 bg-slate-50 border border-slate-150 rounded-xl";
                
                const label = document.createElement('span');
                label.className = "text-xs font-bold text-slate-500 min-w-[60px]";
                label.innerText = `填空 ${bIdx + 1}：`;
                
                const input = document.createElement('input');
                input.type = "text";
                input.placeholder = "输入你的作答";
                input.value = savedAnswers[bIdx] || "";
                input.className = "flex-grow p-2.5 border border-slate-200 rounded-lg text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500";
                
                if (isChecked) {
                    input.disabled = true;
                    const isRight = checkFillAnswer(savedAnswers[bIdx], blank);
                    if (isRight) {
                        input.className += " bg-emerald-50 text-emerald-800 border-emerald-300";
                    } else {
                        input.className += " bg-rose-50 text-rose-800 border-rose-300";
                    }
                } else {
                    input.onchange = (e) => {
                        savedAnswers[bIdx] = e.target.value.trim();
                        fillState[qIdx] = savedAnswers;
                    };
                }
                
                div.appendChild(label);
                div.appendChild(input);

                if (isChecked) {
                    const ansHint = document.createElement('span');
                    ansHint.className = "text-xs font-bold text-emerald-600 md:ml-4";
                    ansHint.innerText = `参考：${blank}`;
                    div.appendChild(ansHint);
                }

                container.appendChild(div);
            });

            // 提交判定按钮
            if (!isChecked) {
                const submitBtn = document.createElement('button');
                submitBtn.className = "w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-sm transition";
                submitBtn.innerText = "提交答案判定";
                submitBtn.onclick = () => {
                    const userAns = fillState[qIdx] || new Array(item.blanks.length).fill('');
                    const allCorrect = userAns.every((ans, idx) => checkFillAnswer(ans, item.blanks[idx]));
                    if (!allCorrect) {
                        if (!wrongList.includes(qIdx)) wrongList.push(qIdx);
                    } else {
                        // 如果之前算错了，纠正为对
                        const indexInWrong = wrongList.indexOf(qIdx);
                        if (indexInWrong !== -1) wrongList.splice(indexInWrong, 1);
                    }
                    renderSingleQuestion();
                    updateStats();
                };
                container.appendChild(submitBtn);
            }

            // 控制考点分析
            const analysis = document.getElementById('single-analysis');
            if (isChecked) {
                analysis.classList.remove('hidden');
                document.getElementById('single-analysis-text').innerText = "本组主观知识点来源于考试指南经典填空部分。";
            } else {
                analysis.classList.add('hidden');
            }
        }

        // 填空题容错算法（支持同义词、顺序不敏感、标点容错）
        function checkFillAnswer(userInput, standardInput) {
            if (!userInput) return false;
            const cleanedUser = userInput.trim().toLowerCase();
            const cleanedStandard = standardInput.trim().toLowerCase();

            if (cleanedUser === cleanedStandard) return true;

            // 特殊词汇模糊逻辑
            if (cleanedStandard.includes("维生素")) {
                if (cleanedUser.includes("b12") || cleanedUser.includes("b₁₂")) return true;
            }
            if (cleanedStandard === "老核幼质") {
                const synonyms = ["核老浆幼", "老质幼核", "幼质老核", "老核幼浆", "核幼浆老"];
                if (synonyms.some(s => cleanedUser.includes(s) || s.includes(cleanedUser))) return true;
            }
            if (cleanedStandard === "幼核老质") {
                const synonyms = ["核幼浆老", "幼质老核", "老质幼核", "核老浆幼", "幼核老浆"];
                if (synonyms.some(s => cleanedUser.includes(s) || s.includes(cleanedUser))) return true;
            }
            if (cleanedStandard === "储存铁缺乏") {
                if (cleanedUser.includes("储存铁") || cleanedUser.includes("id")) return true;
            }
            if (cleanedStandard === "缺铁性红细胞生成") {
                if (cleanedUser.includes("红细胞生成") || cleanedUser.includes("ide")) return true;
            }
            if (cleanedStandard === "缺铁性贫血") {
                if (cleanedUser.includes("贫血") || cleanedUser.includes("ida")) return true;
            }

            return cleanedStandard.includes(cleanedUser) && cleanedUser.length >= 2;
        }

        // 渲染列表模式全量真题
        function renderListQuestions(filterChap = null) {
            const container = document.getElementById('list-mode-view');
            container.innerHTML = '';
            
            const activeList = getActiveList().filter(idx => {
                if (!filterChap) return true;
                return quizData[idx].category === filterChap;
            });

            if (activeList.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-slate-400 bg-white rounded-2xl border">当前没有符合条件的题目</div>`;
                return;
            }

            activeList.forEach((qIdx, displayIdx) => {
                const item = quizData[qIdx];
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4";
                
                if (item.type === 'fill') {
                    // 填空题
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-semibold text-slate-400">${item.category} (主观题)</span>
                            <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-md">Q-${qIdx + 1}</span>
                        </div>
                        <p class="text-base md:text-lg font-bold text-slate-800">${displayIdx + 1}. ${item.q}</p>
                        <div class="space-y-3 fill-inputs-box"></div>
                    `;
                    const inputContainer = div.querySelector('.fill-inputs-box');
                    item.blanks.forEach((blank, bIdx) => {
                        const saved = fillState[qIdx] || new Array(item.blanks.length).fill('');
                        const row = document.createElement('div');
                        row.className = "flex items-center gap-3";
                        row.innerHTML = `
                            <span class="text-xs text-slate-400 w-12 shrink-0">空${bIdx+1}：</span>
                            <input type="text" class="flex-grow p-2 border rounded-lg text-sm" value="${saved[bIdx] || ''}">
                        `;
                        const inp = row.querySelector('input');
                        inp.onchange = (e) => {
                            saved[bIdx] = e.target.value.trim();
                            fillState[qIdx] = saved;
                            updateStats();
                        };
                        inputContainer.appendChild(row);
                    });
                } else {
                    // 选择题
                    const isAnswered = answeredState[qIdx] !== undefined;
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-semibold text-slate-400">${item.category}</span>
                            <span class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-md">Q-${qIdx + 1}</span>
                        </div>
                        <p class="text-base md:text-lg font-bold text-slate-800">${displayIdx + 1}. ${item.q}</p>
                        <div class="space-y-2 options-group"></div>
                    `;
                    const optGroup = div.querySelector('.options-group');
                    item.a.forEach((opt, aIdx) => {
                        const btn = document.createElement('button');
                        btn.className = "option-btn block w-full text-left p-3 border border-slate-200 rounded-xl hover:bg-slate-50 font-medium text-xs md:text-sm transition";
                        btn.innerHTML = `<span class="inline-block w-6 h-6 leading-6 text-center rounded-md bg-slate-100 text-slate-500 font-bold mr-3 text-xs">${String.fromCharCode(65+aIdx)}</span>${opt}`;

                        if (isAnswered) {
                            btn.disabled = true;
                            if (aIdx === item.c) {
                                btn.classList.add('correct');
                            } else if (aIdx === answeredState[qIdx]) {
                                btn.classList.add('wrong');
                            }
                        } else {
                            btn.onclick = () => {
                                answeredState[qIdx] = aIdx;
                                if (aIdx !== item.c) {
                                    if (!wrongList.includes(qIdx)) wrongList.push(qIdx);
                                }
                                renderListQuestions(filterChap);
                                updateStats();
                            };
                        }
                        optGroup.appendChild(btn);
                    });
                }
                container.appendChild(div);
            });
        }

        function getActiveList() {
            if (isWrongOnly) return wrongList;
            return Array.from({length: quizData.length}, (_, i) => i);
        }

        function toggleWrongOnly() {
            isWrongOnly = !isWrongOnly;
            const btn = document.getElementById('btn-wrong-only');
            btn.className = isWrongOnly ? "px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg bg-amber-500 text-white shadow-sm" : "px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200";
            currentIdx = 0;
            if (currentMode === 'single') {
                renderSingleQuestion();
            } else {
                renderListQuestions();
            }
        }

        // 大盘数据汇总
        function updateStats() {
            let answeredCount = 0;
            let correctCount = 0;

            quizData.forEach((item, qIdx) => {
                if (item.type === 'fill') {
                    const ans = fillState[qIdx];
                    if (ans && ans.some(v => v)) {
                        answeredCount++;
                        const allRight = ans.every((v, i) => checkFillAnswer(v, item.blanks[i]));
                        if (allRight) correctCount++;
                    }
                } else {
                    if (answeredState[qIdx] !== undefined) {
                        answeredCount++;
                        if (answeredState[qIdx] === item.c) correctCount++;
                    }
                }
            });

            const progressPercent = Math.round((answeredCount / quizData.length) * 100);
            const accuracy = answeredCount === 0 ? 0 : Math.round((correctCount / answeredCount) * 100);

            document.getElementById('stat-progress').innerText = `${progressPercent}%`;
            document.getElementById('stat-accuracy').innerText = `${accuracy}%`;
            document.getElementById('progress-bar-fill').style.width = `${progressPercent}%`;
            document.getElementById('wrong-count').innerText = wrongList.length;

            const scoreBoard = document.getElementById('score-board');
            if (scoreBoard) {
                scoreBoard.innerText = `${correctCount} / ${quizData.length}`;
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderSingleQuestion();
            }
        }

        function nextQuestion() {
            const activeList = getActiveList();
            if (currentIdx < activeList.length - 1) {
                currentIdx++;
                renderSingleQuestion();
            }
        }

        function resetAll() {
            if (confirm("确定要重新开始所有的自测练习吗？")) {
                answeredState = {};
                fillState = {};
                wrongList = [];
                isWrongOnly = false;
                currentIdx = 0;
                document.getElementById('btn-wrong-only').className = "px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200";
                updateStats();
                if (currentMode === 'single') {
                    renderSingleQuestion();
                } else {
                    renderListQuestions();
                }
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
