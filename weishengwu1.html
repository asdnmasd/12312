    </script>

    <script>
        // 核心运行状态管理
        let state = {
            allQuestions: [],       // 所有解析出来的原始题目
            filteredQuestions: [],   // 当前筛选模式下的可见题目
            currentIdx: 0,          // 卡片模式下当前可见的数组索引
            currentMode: 'card',     // 'card' 或 'paper'
            showOnlyWrong: false,   // 错题本激活标记
            selectedChapter: 'all', // 当前章节筛选
            userAnswers: {},        // 用户答案映射字典 {qId: answer}
            wrongList: []           // 错题留存库 [qId, qId]
        };

        // 页面入口函数
        window.onload = function() {
            initTheme();
            parseDatabase();
            loadProgress();
            populateChapterFilter();
            applyFilters();
            setupKeyboardShortcuts();
        };

        // 1. 高级数据解析核心引擎
        function parseDatabase() {
            const rawText = document.getElementById('raw-data-source').textContent;
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            
            let questions = [];
            let currentItem = null;
            let chapterCounter = 0;
            let lastNum = 0;

            lines.forEach(line => {
                const qMatch = line.match(/^(\d+)\.(.*)/);
                const optMatch = line.match(/^([A-E])[\.、\s]?(.*)/);
                const ansMatch = line.match(/^答案[：\s:]*([A-E])/i);

                if (qMatch) {
                    const num = parseInt(qMatch[1]);
                    if (num === 1 || num < lastNum) {
                        chapterCounter++;
                    }
                    lastNum = num;

                    if (currentItem) questions.push(currentItem);
                    currentItem = createNewQuestionObj(questions.length + 1, chapterCounter, qMatch[2]);
                } else if (optMatch && currentItem) {
                    currentItem.options.push({ key: optMatch[1], text: line });
                } else if (ansMatch && currentItem) {
                    currentItem.answer = ansMatch[1].toUpperCase();
                } else if (line.includes('难易程度') || line.includes('题型')) {
                    // 跳过元数据行
                } else {
                    // 处理无题号段落（如：霍乱弧菌增菌培养时选用）
                    if (currentItem && (currentItem.options.length > 0 || currentItem.answer)) {
                        questions.push(currentItem);
                        currentItem = createNewQuestionObj(questions.length + 1, chapterCounter, line);
                    } else if (currentItem) {
                        currentItem.title += " " + line;
                    }
                }
            });
            if (currentItem) questions.push(currentItem);
            state.allQuestions = questions;
        }

        function createNewQuestionObj(id, chNum, titleText) {
            return {
                id: id,
                chapter: `第 ${chNum} 部分`,
                title: titleText,
                options: [],
                answer: ''
            };
        }

        // 2. 章节智能联动渲染
        function populateChapterFilter() {
            const select = document.getElementById('chapter-filter');
            const chapters = [...new Set(state.allQuestions.map(q => q.chapter))];
            chapters.forEach(ch => {
                const opt = document.createElement('option');
                opt.value = ch;
                opt.textContent = ch;
                select.appendChild(opt);
            });
        }

        // 3. 核心大过滤器（核心消灭错题机制）
        function applyFilters() {
            state.filteredQuestions = state.allQuestions.filter(q => {
                const matchChapter = (state.selectedChapter === 'all' || q.chapter === state.selectedChapter);
                const matchWrong = (!state.showOnlyWrong || state.wrongList.includes(q.id));
                return matchChapter && matchWrong;
            });

            // 越界保护检查
            if (state.currentIdx >= state.filteredQuestions.length) {
                state.currentIdx = Math.max(0, state.filteredQuestions.length - 1);
            }

            renderInterface();
        }

        // 4. 界面综合渲染管线
        function renderInterface() {
            updateDashboardMetrics();
            renderNavigationGrid();

            const hasData = state.filteredQuestions.length > 0;
            document.getElementById('empty-state').style.display = hasData ? 'none' : 'block';
            document.getElementById('container-card-mode').style.display = (hasData && state.currentMode === 'card') ? 'block' : 'none';
            document.getElementById('container-paper-mode').style.display = (hasData && state.currentMode === 'paper') ? 'block' : 'none';

            if (!hasData) return;

            if (state.currentMode === 'card') {
                renderCardView();
            } else {
                renderPaperView();
            }
        }

        // 卡片渲染视图
        function renderCardView() {
            const q = state.filteredQuestions[state.currentIdx];
            document.getElementById('card-chapter').textContent = `${q.chapter} • 题号 ID: ${q.id}`;
            document.getElementById('card-question-title').textContent = q.title;
            document.getElementById('card-index-indicator').textContent = `${state.currentIdx + 1} / ${state.filteredQuestions.length}`;

            const optionsContainer = document.getElementById('card-options');
            optionsContainer.innerHTML = '';

            const userAns = state.userAnswers[q.id];

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-4 rounded-xl border font-medium transition-all flex items-center justify-between group ${getOptionStyleClass(opt.key, userAns, q.answer)}`;
                btn.onclick = () => handleSelectOption(q.id, opt.key);
                btn.innerHTML = `<span>${opt.text}</span><span class="opacity-0 group-hover:opacity-100 text-xs px-2 py-1 bg-slate-200 dark:bg-slate-700 rounded">${opt.key}</span>`;
                optionsContainer.appendChild(btn);
            });

            // 错题解析区动态展示
            const cardAnalysis = document.getElementById('card-analysis');
            if (userAns) {
                cardAnalysis.classList.remove('hidden');
                document.getElementById('card-correct-answer').textContent = q.answer;
                const isCorrect = userAns === q.answer;
                document.getElementById('analysis-status-icon').textContent = isCorrect ? '✅' : '❌';
                document.getElementById('analysis-status-text').textContent = isCorrect ? '回答正确！自动移出或通过消灭机制' : '回答错误。系统已自动拦截进错题本';
                document.getElementById('analysis-status-text').className = isCorrect ? 'text-emerald-500 font-bold text-sm' : 'text-rose-500 font-bold text-sm';
            } else {
                cardAnalysis.classList.add('hidden');
            }
        }

        // 整卷全览渲染视图
        function renderPaperView() {
            const container = document.getElementById('container-paper-mode');
            container.innerHTML = '';

            state.filteredQuestions.forEach((q, loopIdx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm transition-all";
                
                const userAns = state.userAnswers[q.id];

                let optionsHtml = '';
                q.options.forEach(opt => {
                    optionsHtml += `
                        <button onclick="handleSelectOption(${q.id}, '${opt.key}')" class="w-full text-left p-3 rounded-lg border text-sm font-medium transition-all flex justify-between items-center ${getOptionStyleClass(opt.key, userAns, q.answer)}">
                            <span>${opt.text}</span>
                        </button>
                    `;
                });

                let analysisHtml = userAns ? `
                    <div class="mt-3 p-3 bg-slate-50 dark:bg-slate-900 rounded-xl text-xs border border-slate-100 dark:border-slate-800">
                        <span class="${userAns === q.answer ? 'text-emerald-500' : 'text-rose-500'} font-bold">${userAns === q.answer ? '✅ 正确' : '❌ 错误'}</span> 
                        • 核心解析答案: <span class="text-emerald-500 font-black">${q.answer}</span>
                    </div>
                ` : '';

                itemDiv.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs font-semibold text-slate-400">${q.chapter} #题号:${q.id}</span>
                    </div>
                    <h4 class="font-bold text-base mb-4 leading-relaxed">${loopIdx + 1}. ${q.title}</h4>
                    <div class="space-y-2">${optionsHtml}</div>
                    ${analysisHtml}
                `;
                container.appendChild(itemDiv);
            });
        }

        // 动态计算样式判定辅助
        function getOptionStyleClass(currentKey, userAns, correctAns) {
            if (!userAns) return 'border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900';
            if (currentKey === correctAns) return 'bg-emerald-50 dark:bg-emerald-950/40 border-emerald-500 text-emerald-600 dark:text-emerald-400';
            if (currentKey === userAns && userAns !== correctAns) return 'bg-rose-50 dark:bg-rose-950/40 border-rose-500 text-rose-500';
            return 'border-slate-100 dark:border-slate-900 opacity-60';
        }

        // 5. 交互交互处理机制核心（答错拦截 / 答对消灭）
        function handleSelectOption(qId, selectedOpt) {
            const q = state.allQuestions.find(item => item.id === qId);
            if (!q) return;

            // 记录答案
            state.userAnswers[qId] = selectedOpt;

            if (selectedOpt === q.answer) {
                // 答对自动消灭机制
                state.wrongList = state.wrongList.filter(id => id !== qId);
            } else {
                // 智能做错拦截
                if (!state.wrongList.includes(qId)) {
                    state.wrongList.push(qId);
                }
            }

            saveProgress();
            
            // 局部流畅刷新动效渲染
            if (state.currentMode === 'card') {
                renderCardView();
                updateDashboardMetrics();
                renderNavigationGrid();
            } else {
                renderInterface();
            }
        }

        // 6. 数据监控仪表盘刷新
        function updateDashboardMetrics() {
            const totalScope = state.allQuestions.length;
            const answeredScope = state.allQuestions.filter(q => state.userAnswers[q.id]).length;
            const correctScope = state.allQuestions.filter(q => state.userAnswers[q.id] === q.answer).length;
            
            // 基础面板数据
            document.getElementById('stat-total').textContent = totalScope;
            document.getElementById('stat-answered').textContent = answeredScope;
            document.getElementById('stat-correct').textContent = correctScope;
            document.getElementById('stat-wrong').textContent = state.wrongList.length;
            document.getElementById('wrong-badge').textContent = state.wrongList.length;

            // 筛选标题组及进度条更新
            document.getElementById('scope-title').textContent = state.showOnlyWrong ? "错题集中冲刺进度" : (state.selectedChapter === 'all' ? "全局测试进度" : state.selectedChapter);
            
            const activeTotal = state.filteredQuestions.length;
            const activeAnswered = state.filteredQuestions.filter(q => state.userAnswers[q.id]).length;
            document.getElementById('progress-text').textContent = `${activeAnswered} / ${activeTotal}`;
            
            const progressPercent = activeTotal > 0 ? (activeAnswered / activeTotal) * 100 : 0;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            const accuracy = answeredScope > 0 ? Math.round((correctScope / answeredScope) * 100) : 0;
            document.getElementById('accuracy-text').textContent = `${accuracy}%`;
        }

        // 7. 渲染矩阵与导航跳转
        function renderNavigationGrid() {
            const grid = document.getElementById('matrix-grid');
            grid.innerHTML = '';

            state.filteredQuestions.forEach((q, loopIdx) => {
                const cell = document.createElement('button');
                const userAns = state.userAnswers[q.id];
                
                let btnStyle = "bg-slate-100 dark:bg-slate-800 text-slate-400"; // 未答
                if (userAns) {
                    btnStyle = (userAns === q.answer) 
                        ? "bg-emerald-500 text-white font-bold" 
                        : "bg-rose-500 text-white font-bold";
                }

                if (state.currentMode === 'card' && loopIdx === state.currentIdx) {
                    cell.className = `p-2 text-xs rounded-lg border-2 border-blue-500 focus:outline-none transition-all ring-2 ring-blue-400 ${btnStyle}`;
                } else {
                    cell.className = `p-2 text-xs rounded-lg hover:scale-105 transition-all ${btnStyle}`;
                }

                cell.textContent = q.id;
                cell.onclick = () => jumpToQuestion(loopIdx);
                grid.appendChild(cell);
            });
        }

        function jumpToQuestion(index) {
            state.currentIdx = index;
            if (state.currentMode === 'paper') {
                // 如果是整卷模式，跳转改为高亮平滑滚动效果
                switchMode('card');
            }
            renderInterface();
        }

        // 8. 模式及高级过滤器控制流
        function switchMode(mode) {
            state.currentMode = mode;
            document.getElementById('btn-mode-card').className = mode === 'card' 
                ? "px-3 py-1.5 rounded-lg font-medium transition-all bg-white dark:bg-slate-700 shadow-sm text-blue-500"
                : "px-3 py-1.5 rounded-lg font-medium transition-all text-slate-400 hover:text-slate-600";
            document.getElementById('btn-mode-paper').className = mode === 'paper' 
                ? "px-3 py-1.5 rounded-lg font-medium transition-all bg-white dark:bg-slate-700 shadow-sm text-blue-500"
                : "px-3 py-1.5 rounded-lg font-medium transition-all text-slate-400 hover:text-slate-600";
            renderInterface();
        }

        function toggleWrongNotebook() {
            state.showOnlyWrong = !state.showOnlyWrong;
            const btn = document.getElementById('btn-wrong-notebook');
            if (state.showOnlyWrong) {
                btn.classList.add('bg-rose-50', 'border-rose-300', 'text-rose-600', 'dark:bg-rose-950/40');
            } else {
                btn.className = "px-3 py-2 rounded-xl font-medium border transition-all flex items-center space-x-1 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:border-red-500";
            }
            state.currentIdx = 0;
            applyFilters();
        }

        function handleChapterFilter(chapterValue) {
            state.selectedChapter = chapterValue;
            state.currentIdx = 0;
            applyFilters();
        }

        function clearAllFilters() {
            state.selectedChapter = 'all';
            state.showOnlyWrong = false;
            document.getElementById('chapter-filter').value = 'all';
            const btn = document.getElementById('btn-wrong-notebook');
            btn.className = "px-3 py-2 rounded-xl font-medium border transition-all flex items-center space-x-1 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:border-red-500";
            applyFilters();
        }

        // 重置当前显示范围的题目的解答状态
        function resetCurrentScope() {
            if (confirm("确定要清空当前显示范围内的做题进度吗？此操作不可逆！")) {
                state.filteredQuestions.forEach(q => {
                    delete state.userAnswers[q.id];
                    state.wrongList = state.wrongList.filter(id => id !== q.id);
                });
                saveProgress();
                applyFilters();
            }
        }

        // 9. 桌面端全键盘快捷操作控题流
        function setupKeyboardShortcuts() {
            window.addEventListener('keydown', (e) => {
                if (state.currentMode !== 'card' || state.filteredQuestions.length === 0) return;
                
                const key = e.key.toUpperCase();
                // 映射 A-E 键答题
                if (['A', 'B', 'C', 'D', 'E'].includes(key)) {
                    const activeQ = state.filteredQuestions[state.currentIdx];
                    if (activeQ && activeQ.options.some(opt => opt.key === key)) {
                        handleSelectOption(activeQ.id, key);
                    }
                }
                // 键盘方向键控制翻页
                if (e.key === 'ArrowLeft') {
                    prevCard();
                }
                if (e.key === 'ArrowRight') {
                    nextCard();
                }
            });
        }

        function prevCard() {
            if (state.currentIdx > 0) {
                state.currentIdx--;
                renderCardView();
                renderNavigationGrid();
            }
        }

        function nextCard() {
            if (state.currentIdx < state.filteredQuestions.length - 1) {
                state.currentIdx++;
                renderCardView();
                renderNavigationGrid();
            }
        }

        // 10. LocalStorage 离线数据读写
        function saveProgress() {
            localStorage.setItem('med_quiz_answers', JSON.stringify(state.userAnswers));
            localStorage.setItem('med_quiz_wrong', JSON.stringify(state.wrongList));
        }

        function loadProgress() {
            const cachedAnswers = localStorage.getItem('med_quiz_answers');
            const cachedWrong = localStorage.getItem('med_quiz_wrong');
            if (cachedAnswers) state.userAnswers = JSON.parse(cachedAnswers);
            if (cachedWrong) state.wrongList = JSON.parse(cachedWrong);
        }

        function factoryReset() {
            if (confirm("警告：这将永久删除所有的刷题记录、错题留存并恢复至初始出厂状态，确定继续吗？")) {
                localStorage.clear();
                state.userAnswers = {};
                state.wrongList = [];
                clearAllFilters();
            }
        }

        // 11. 深色模式智能化环境适配切换
        function initTheme() {
            if (localStorage.getItem('dark-mode') === 'true' || 
                (!('dark-mode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            switchMode('card');
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('dark-mode', isDark);
        }
    </script>
</body>
</html>
