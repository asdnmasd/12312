                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

    <script>
        // 245道临床输血医学大纲全库无损集成
        const quizData = [
            {
                title: "第一章：绪论 (5题)",
                questions: [
                    { q: "人类输血史上第一个被发现的红细胞血型系统是", a: ["MNS", "Duffy", "ABO", "Rh", "Xg"], c: 2, desc: "ABO血型系统是人类输血史上首个被Landsteiner于1900年发现的红细胞血型系统。" },
                    { q: "1817年, 英国妇产科医生结合动物输血的成功经验, 施行人-人输血救治大出血产妇, 却有近半数患者死亡, 下面哪项说法是错误的", a: ["患者因血型不合出现了输血反应", "大出血产妇应考虑止血, 不应进行输血治疗", "输血所致的免疫反应加快了死亡", "疾病原因导致的患者死亡", "未进行血型配合性检查, 盲目实施输血治疗"], c: 1, desc: "在面临急性产科大出血合并休克危险时，补充血容量及输血治疗是强有力的抢救指征。死亡的主要原因是因当时不了解血型系统导致严重的血型不合溶血。" },
                    { q: "最重要的新一代血液成分制品研究是", a: ["细胞培养和基因扩增", "血液代用品和人造血的研发", "单克隆技术", "基因工程技术", "细胞因子研究"], c: 1, desc: "血液代用品和人造红细胞/人造血的研发能有效缓解供血紧张、避免交叉病原传播，是新一代血液制品的核心课题。" },
                    { q: "哪一年尝试应用塑料输血器材", a: ["1900", "1950", "2010", "1920", "1980"], c: 1, desc: "1950年前后，塑料输血袋和输血管开始尝试投入临床，极大地推进了成分输血与无菌保存的发展。" },
                    { q: "Landsteiner 首次发现人类红细胞上存在血型抗原。关于血型的发现，下面说法不正确的是", a: ["1940年再次发现Rh血型", "首次发现人类红细胞A、B、O血型", "因发现 ABO血型而获得了诺贝尔生理学或医学奖", "享有“血型之父”的美誉", "发现人类红细胞 AB血型"], c: 4, desc: "Landsteiner在1900年首次发现了A、B、O三种血型。AB亚型则是于1902年由他的学生Decastello和Sturli补充发现的。" }
                ]
            },
            {
                title: "第二章：输血医学基本理论 (10题)",
                questions: [
                    { q: "男, 78岁。需2单位AB型红细胞, 经盐水试验与4例AB型库存血配血, 发现主侧均为1+凝集。若患者自身红细胞和自身血清在盐水中有凝集反应, 最可能的情况是", a: ["存在冷抗体或血浆蛋白异常", "存在意外抗体", "存在球蛋白升高", "存在温自身抗体", "存在冷自身抗体"], c: 0, desc: "盐水介质中自身红细胞与自身血清发生反应，且多侧交叉配血有微弱凝集，最常提示存在冷凝集素（冷抗体）或患者伴发高球蛋白等血浆蛋白异常。" },
                    { q: "男, 59岁。因慢性右心衰竭收入院, 查体可见双下肢明显水肿, 其主要原因可能是", a: ["血浆胶体渗透压降低", "组织液胶体渗透压升高", "毛细血管血压升高", "组织液静水压降低", "淋巴回流受阻"], c: 2, desc: "右心衰竭导致体循环静脉回流受阻，静脉压和毛细血管流体静压升高，使组织液生成增多，导致双下肢水肿。" },
                    { q: "下列遗传方式的群体中比例为女:男=2:1的是", a: ["常染色体显性遗传", "常染色体隐性遗传", "Y连锁遗传", "X 连锁隐性遗传", "X 连锁显性遗传"], c: 4, desc: "X连锁显性遗传由于女性有两条X染色体，其患病概率约为男性的2倍（比例2:1）。" },
                    { q: "血红蛋白氧饱和度的主要影响因素是", a: ["二氧化碳分压", "氧分压", "pH", "体温", "2,3-二磷酸甘油酸盐浓度"], c: 1, desc: "血红蛋白氧饱和度（$SO_2$）主要取决于血液中的氧分压（$PO_2$），两者呈S型氧解离曲线关系。" },
                    { q: "血浆蛋白的主要功能不包括", a: ["免疫防御", "维持 pH", "输送营养物质", "维持血浆晶体渗透压", "参与止凝血"], c: 3, desc: "血浆蛋白（特别是白蛋白）分子量大，主要维持血浆的“胶体”渗透压。而晶体渗透压则主要依靠无机盐等小分子晶体维持。" },

                    { q: "红细胞冷抗体最活跃的温度是", a: ["$37^{\\circ}C$", "$4^{\\circ}C\\pm2^{\\circ}C$", "$22^{\\circ}C$", "$56^{\\circ}C$", "$4^{\\circ}C$"], c: 4, desc: "红细胞冷抗体（如抗-I）通常是IgM类，其与靶抗原在超低温环境中结合力极强，最适结合温度为$4^{\\circ}C$。" },
                    { q: "父亲红细胞 ABO血型为AB型, 母亲为 A型(基因型为AO), 子代可能出现的血型为", a: ["A", "A、B、O", "A、B、O、AB", "AB", "A、B、AB"], c: 4, desc: "AB型(AB)与AO型进行重组配对，子代的基因型可能为：AA(A型)、AO(A型)、BB(B型)、BO(B型)及AB(AB型)。因此可能产生A、B、AB型。" },

            {
                title: "第三章：人体血型与抗原抗体 (30题)",
                questions: [
                    { q: "患者, 男, 55岁, 近半年来皮肤黏膜出血, PLT $40\\times10^9/L$, 血小板自身抗体阳性, 骨髓巨核细胞增多伴成熟障碍。可能诊断为", a: ["免疫性血小板减少症(ITP)", "过敏性紫癜", "自身免疫性溶血性贫血", "骨髓增生异常综合征", "输血后紫癜"], c: 0, desc: "自身血小板抗体强阳性、血小板重度减低且骨髓伴巨核细胞代偿性增多伴成熟障碍，是免疫性血小板减少症（ITP）特征表现。" },
                    { q: "有关孟买型的叙述, 错误的是", a: ["红细胞与抗-A抗体不产生凝集反应", "红细胞与抗-H抗体不发生凝集反应", "血清中有抗A和抗B抗体", "血清中有 IgG类抗H抗体", "红细胞与抗A、抗B抗体均不发生凝集反应"], c: 4, desc: "孟买型不表达H抗原。因为缺乏H抗原，所以也就没有A、B抗原。其红细胞不与抗A、抗B、抗H反应。但由于本病血清中常存在针对正常人H抗原的高滴度抗-H抗体，所以无法输注普通红细胞。" },
                    { q: "关于 Rh 血型抗原, 下列说法正确的是", a: ["抗原强弱为D>E>C>c>e", "CCDEe 与CcDEe相比, 前者的C抗原较强", "CCDEe与CcDEe相比, 前者的E抗原较强", "CCDEe 与 CcDEe 相比, 前者的D抗原较强", "抗原性强于ABO 系统抗原"], c: 0, desc: "Rh血型系统中，各抗原产生免疫原性的强度顺序为：D > E > C > c > e。" },
                    { q: "白血病患者多次输注 ABO同型的血小板治疗。最近几次输注后效果均不佳, 最可能原因是", a: ["患者体内产生了HPA-1抗体", "患者体内产生了其他红细胞抗体", "患者体内产生了HLA同种抗体", "患者体内产生了自身血小板抗体", "患者体内产生了粒细胞抗体"], c: 2, desc: "血小板表面大量表达HLA-I类抗原。由于反复、长期多次输入异体血小板，极高发同种HLA抗体生成，导致血小板快速被脾脏清除清除（PTR）。" },
                    { q: "白细胞表达的特有血型抗原为", a: ["Rh 血型抗原", "中性粒细胞特异性抗原(HNA)", "ABO血型抗原", "人类白细胞抗原(HLA)", "P 血型抗原"], c: 1, desc: "人类白细胞抗原广泛存在多系表面；但中性粒细胞特异性抗原（HNA）是仅特异性分布并表达于中性粒细胞表面的特有系统。" },
                    { q: "与ABO 抗原不同, Rh抗原在哪个时期得到了充分发育", a: ["新生儿期", "胎儿早期", "成人期", "老年期", "青壮年期"], c: 1, desc: "Rh系统各抗原早在胎儿发育的超早期就已经高度发育健全，因而在新生儿溶血（Rh-HDN）中发病极重。" },
                    { q: "引起血小板输注无效(PTR)的最常见同种免疫抗体是", a: ["HLA 核心抗体", "I 系统抗体", "ABO 同种抗体", "Rh 意外抗体", "HPA 结合抗体"], c: 0, desc: "约80%-90%的免疫性血小板输注无效(PTR)是由于受者体内产生针对供者 HLA-I 类分子（A或B位点）的同种抗体导致的。" },
                    { q: "A型个体的主要亚型是", a: ["A2 和 Ax", "A1 和A2", "A3 和 Ax", "Am 和 Ax", "A2 和 A3"], c: 1, desc: "在人类ABO血型中，A型主要存在 A1（占绝大多数）和 A2 两大最具临床意义的亚型。" },
                    { q: "关于HLA分子的组织分布, 错误的是", a: ["HLA-II类分子主要表达在巨噬细胞、树突状细胞等专职APC 表面", "HLA-I 类分子广泛分布于所有有核细胞表面", "心、肝、肺组织表达 HLA-I类分子水平比较低", "巨噬细胞和树突状细胞 HLA 分子的表达量都比较高", "在血、尿、唾液、精液及乳汁中 HLA 分子一般不表达"], c: 4, desc: "可溶性HLA-I类和II类分子广泛存在于全血、尿液、唾液及乳汁等多种体液分泌物中。" },
                    { q: "Lewis 抗原合成受控于哪些基因", a: ["FUT1(H)和 FUT2(Se)", "FUT2(Se)和 FUT3(Le)", "FUT1(H)", "FUT2(Se)", "FUT3(Le)"], c: 1, desc: "Lewis抗原的特异性合成必须依靠分泌基因 FUT2(Se) 和路易斯基因 FUT3(Le) 之间的协同串联表达。" },
                    { q: "重型再生障碍性贫血患者, 需要长期输血, 反复输血可使患者体内出现", a: ["HLA-II类抗体", "HNA-2a 抗体", "HNA-I 抗体", "HLA-I 类同种抗体", "HNA-4a 抗体"], c: 3, desc: "长期输入含极少量有核白细胞的成分血液，其表面的HLA-I抗原会高强免疫刺激受者，使其产生针对HLA-I的异体抗体。" },
                    { q: "关于 Rh 血型遗传, 下列说法正确的是", a: ["Rh 阳性与 Rh阳性个体婚配, 后代可有Rh阴性", "Rh 阳性与 Rh阴性个体婚配, 后代必定是 Rh 阳性", "Rh 阳性与 Rh阳性个体婚配, 后代必定是 Rh阳性", "CCDEe 个体与CcDEe个体婚配, 后代不会出现 CCdee", "CCDEE 个体与CcDEe个体婚配, 后代可有 ccDee"], c: 0, desc: "RhD基因具有显隐性特征。若父母皆为Dd杂合阳性，其相配有 25% 的概率（dd）诞生出 Rh 阴性的后代。" },
                    { q: "常用于检测 ABH血型物质的体液是", a: ["脑脊液", "唾液", "胃液", "精液", "泪液"], c: 1, desc: "分泌型人群中唾液含有超高浓度的可溶性ABH血型物质，极易用于中和阻断试验诊断亚型。" },
                    { q: "根据 ABO血型遗传规则, 父亲为O型, 母亲为B型(且为杂合BO), 其子女可能为", a: ["B或O", "A或O", "A、B、AB 或O", "A、B或AB", "O"], c: 0, desc: "O型(OO)与BO型结合，其后代的重组基因只可能是 BO(B型) 或 OO(O型)。" },
                    { q: "人类 ABO血型抗原属于", a: ["异嗜性抗原", "自身抗原", "同种异型抗原", "异种抗原", "半抗原"], c: 2, desc: "ABO血型抗原是同一种属（人）不同个体之间存在的免疫学差异抗原，被称为同种异型抗原。" },
                    { q: "ABO血型系统抗体主要为", a: ["免疫性抗体", "意外抗体", "异种抗体", "自身抗体", "天然抗体"], c: 4, desc: "人类ABO系统的抗-A或抗-B主要是在没有明显输血或免疫史情况下由于接触环境肠道类似抗原所产生的“天然抗体”。" },
                    { q: "Rh 阴性患者且体内已有抗D抗体, 若输注 Rh阳性血液, 溶血反应将", a: ["延迟发生", "立即发生", "半天后发生", "不会发生", "间歇发生"], c: 1, desc: "因体内早已在前期妊娠或输血中致敏产生了针对D的抗-D，本次一旦连入D阳性红细胞会发生灾难性的即刻溶血。" },
                    { q: "MNS 血型系统中GYPA和GYPB 基因分别编码的蛋白是", a: ["MM、MN 抗原", "MM、NN 抗原", "GPA 和 GPB", "MN、Ss 抗原", "SS、ss抗原"], c: 2, desc: "MNS系统中，1号常染色体上的 GYPA 编码甘氨酸糖蛋白A (GPA)，GYPB 编码甘氨酸糖蛋白B (GPB)。" },
                    { q: "O型红细胞上存在的血型抗原为", a: ["B 抗原", "A 抗原", "H 抗原", "A和B抗原", "ABH 抗原"], c: 2, desc: "O型由于缺乏A、B转移酶，前体链只被H酶修饰，因此其表面含有最丰富的H抗原。" },
                    { q: "双肾结石, 慢性肾功能衰竭拟行肾移植手术, 组织配型时最需要严格考虑共显的位点是", a: ["HLA-DP、DQ和DR", "HLA-A、 B", "HLA-A、B和DQ", "HLA-A、B、DR", "HLA-A、B、DP"], c: 3, desc: "实体脏器移植中，供受者的 HLA-A、HLA-B 及 HLA-DR 位点基因相符度直接决定移植后排斥反应的发生率。" },

                    { q: "正常成人红细胞上的H抗原表达的强弱顺序依次为", a: ["O型>A1B 型>B型>A2型>A1型>A2B型", "O 型>A1型>B型>A2B 型>A2型>A1B 型", "O 型>A2型>B型>A2B 型>A1型>A1B型", "O 型>B 型>A2型>A2B 型>A1型>A1B型", "O 型>A2B 型>B型>A2型>A1型>A1B 型"], c: 2, desc: "由于A1、B转移酶会大量消耗H底物转化，因此H抗原暴露强弱顺序为：O > A2 > B > A2B > A1 > A1B。" },

                    { q: "下列哪项不属于HLA的独特遗传特点", a: ["连锁不平衡", "共显性遗传", "高度多态性", "多基因性", "隐性遗传"], c: 4, desc: "人类白细胞抗原（HLA）在表达上属于高度复杂的单倍型共显性显性表达遗传，不遵循隐性遗传规律。" },

            {
