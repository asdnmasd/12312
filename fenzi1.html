<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>临床分子生物学综合自测系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            600: '#3b82f6',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 提升移动端点击反馈速度 */
        button, .option-btn {
            touch-action: manipulation;
        }
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (min-width: 1024px) {
            .option-btn:hover:not(:disabled) {
                transform: translateX(6px);
            }
        }
        .correct {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #059669 !important;
        }
        .wrong {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #dc2626 !important;
        }
        .correct-outline {
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
            color: #065f46 !important;
        }
        .dark .correct-outline {
            background-color: #064e3b !important;
            color: #34d399 !important;
        }
        .drawer-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 填空题输入框样式 */
        .fill-blank-input {
            border-bottom: 2px solid #3b82f6;
            background: transparent;
            text-align: center;
            outline: none;
            width: 160px;
            padding: 2px 5px;
            font-weight: bold;
        }
        .fill-blank-input:disabled {
            cursor: not-allowed;
        }
        .fill-blank-correct {
            border-bottom-color: #10b981 !important;
            color: #10b981 !important;
            background-color: rgba(16, 185, 129, 0.1);
        }
        .fill-blank-wrong {
            border-bottom-color: #ef4444 !important;
            color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300 flex flex-col selection:bg-blue-500 selection:text-white">
    
    <!-- 顶栏导航 -->
    <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-colors">
        <div class="max-w-6xl mx-auto px-4 h-14 md:h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2 md:space-x-3">
                <span class="text-lg md:text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">分子生物自测</span>
                <span class="px-2 py-0.5 text-[10px] md:text-xs font-semibold rounded-full bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300">234题全量版</span>
            </div>
            <div class="flex items-center space-x-2 md:space-x-3">
                <!-- 全局重置按钮 -->
                <button onclick="resetAllProgress()" class="p-2 rounded-lg bg-red-50 dark:bg-red-950/20 text-red-500 hover:bg-red-100 transition text-xs flex items-center space-x-1" title="清空全部自测数据">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    <span class="hidden sm:inline">重置所有</span>
                </button>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition" aria-label="切换深色模式">
                    <!-- 太阳图标 -->
                    <svg id="sun-icon" class="w-4 h-4 md:w-5 md:h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                    <!-- 月亮图标 -->
                    <svg id="moon-icon" class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
                <button onclick="showWrongBook()" class="px-2.5 py-1.5 rounded-lg border border-red-200 dark:border-red-900 text-red-500 hover:bg-red-50 dark:hover:bg-red-950/30 text-xs md:text-sm font-medium transition flex items-center space-x-1">
                    <span>错题集</span>
                    <span id="wrong-count" class="bg-red-100 dark:bg-red-900 text-red-600 dark:text-red-300 px-1.5 py-0.5 rounded-full text-[10px] md:text-xs">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 主体区域 -->
    <main class="flex-grow max-w-6xl w-full mx-auto p-3 md:p-8 flex flex-col justify-start">
        
        <!-- 首页/章节选择 -->
        <div id="home-screen" class="space-y-6 md:space-y-8 w-full">
            <div class="bg-white dark:bg-slate-800 rounded-2xl md:rounded-3xl shadow-md p-6 md:p-12 text-center relative overflow-hidden transition">
                <div class="absolute top-0 right-0 w-48 h-48 md:w-64 md:h-64 bg-blue-100/30 dark:bg-blue-900/10 rounded-full filter blur-3xl -mr-16 -mt-16"></div>
                <h1 class="text-2xl md:text-4xl font-extrabold text-slate-800 dark:text-white tracking-tight mb-2 md:mb-4">临床分子生物学综合自测系统</h1>
                <p class="text-slate-500 dark:text-slate-400 max-w-2xl mx-auto text-xs md:text-sm px-2">本系统完美覆盖 **234道全大纲自测真题**（227道核心单选题 + 7道综合填空自测关卡）。支持章节多级重置、移动端滑动手势切题、学霸错题攻坚及离线自适应保存进度。</p>
                
                <div class="mt-6 md:mt-8 flex justify-center space-x-3 md:space-x-4">
                    <div class="bg-slate-50 dark:bg-slate-700/50 rounded-xl md:rounded-2xl px-4 py-3 md:px-6 md:py-4 border border-slate-100 dark:border-slate-800 min-w-[100px] md:min-w-[120px]">
                        <div class="text-xl md:text-2xl font-bold text-blue-600 dark:text-blue-400" id="global-progress">0%</div>
                        <div class="text-[10px] md:text-xs text-slate-400">自测总进度</div>
                    </div>
                    <div class="bg-slate-50 dark:bg-slate-700/50 rounded-xl md:rounded-2xl px-4 py-3 md:px-6 md:py-4 border border-slate-100 dark:border-slate-800 min-w-[100px] md:min-w-[120px]">
                        <div class="text-xl md:text-2xl font-bold text-green-600 dark:text-green-400" id="global-accuracy">0%</div>
                        <div class="text-[10px] md:text-xs text-slate-400">平均正确率</div>
                    </div>
                </div>
            </div>

            <div id="chapter-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                <!-- 章节卡片动态加载 -->
            </div>
        </div>

        <!-- 答题自测区域 -->
        <div id="quiz-screen" class="hidden lg:grid lg:grid-cols-4 gap-6 md:gap-8 flex-grow">
            <!-- 左侧/答题面板 -->
            <div class="lg:col-span-3 flex flex-col justify-between space-y-4 md:space-y-6">
                <div class="flex items-center justify-between">
                    <button onclick="showHome()" class="text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 flex items-center text-sm md:text-base font-medium transition">
                        <svg class="w-4 h-4 md:w-5 md:h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        返回首页
                    </button>
                    <div class="flex items-center space-x-2">
                        <!-- 单章重置按钮 -->
                        <button id="chapter-reset-btn" onclick="resetChapter()" class="px-2.5 py-1 text-xs font-semibold rounded bg-orange-50 dark:bg-orange-950/20 text-orange-600 hover:bg-orange-100 transition flex items-center space-x-1">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89l-4.244 4.243"></path></svg>
                            <span>重置本章</span>
                        </button>
                        <div class="text-xs md:text-sm font-semibold px-2.5 py-1 rounded-full bg-slate-100 dark:bg-slate-800" id="progress-text">第 1 / 10 题</div>
                    </div>
                </div>

                <!-- 题目卡片（支持滑动手势） -->
                <div id="swipe-area" class="bg-white dark:bg-slate-800 rounded-xl md:rounded-2xl shadow-sm border border-slate-100 dark:border-slate-850 p-5 md:p-8 flex-grow flex flex-col justify-between transition min-h-[350px] select-none relative">
                    <div>
                        <div id="category-tag" class="inline-block px-2.5 py-0.5 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-[10px] md:text-xs font-semibold mb-3 md:mb-4">章节名称</div>
                        <h2 id="question-text" class="text-base md:text-lg font-bold text-slate-800 dark:text-slate-100 leading-relaxed mb-4 md:mb-6">题目正在加载...</h2>
                    </div>
                    
                    <div id="options-container" class="space-y-3.5 w-full">
                        <!-- 选项或填空输入框动态生成 -->
                    </div>

                    <!-- 官方解析区 -->
                    <div id="analysis-box" class="mt-6 p-4 bg-emerald-50 dark:bg-emerald-950/20 text-emerald-900 dark:text-emerald-300 rounded-xl border border-emerald-100 dark:border-emerald-900 text-xs md:text-sm hidden leading-relaxed">
                        <p class="font-bold flex items-center gap-1.5 mb-1 text-emerald-700 dark:text-emerald-400">💡 考点分析与参考：</p>
                        <p id="analysis-text">暂无解析数据。</p>
                    </div>
                </div>

                <!-- 底部交互控制栏 -->
                <div class="flex justify-between items-center bg-white dark:bg-slate-800 p-3 md:p-4 rounded-xl border border-slate-100 dark:border-slate-850">
                    <div class="flex flex-col md:flex-row md:items-center md:space-x-2">
                        <span class="text-[10px] md:text-xs text-slate-400">本章当前正确率:</span>
                        <span id="accuracy" class="text-xs md:text-sm font-bold text-slate-700 dark:text-slate-300">0%</span>
                    </div>
                    <div class="space-x-2 flex">
                        <button id="prev-btn" onclick="prevQuestion()" class="px-3.5 py-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-30 transition text-xs md:text-sm font-medium">上一题</button>
                        <button id="next-btn" onclick="nextQuestion()" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition text-xs md:text-sm font-medium">下一题</button>
                    </div>
                </div>
            </div>

            <!-- 右侧/桌面端自适应侧边答题卡 -->
            <div class="hidden lg:block space-y-6">
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-850 p-6">
                    <h3 class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-4 flex justify-between items-center">
                        <span>答题卡</span>
                        <span class="text-[10px] font-normal text-slate-400">点击可快速跳转</span>
                    </h3>
                    <div id="answer-card-grid-desktop" class="grid grid-cols-5 gap-2 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- 题号卡片 -->
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-850 p-4 text-center">
                    <button onclick="finishSection()" class="w-full py-2.5 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 hover:bg-red-500 hover:text-white rounded-lg text-sm font-bold transition">
                        提前交卷并结算
                    </button>
                </div>
            </div>
        </div>

        <!-- 结算展示 -->
        <div id="result-screen" class="hidden max-w-2xl mx-auto bg-white dark:bg-slate-800 rounded-2xl md:rounded-3xl shadow-md p-6 md:p-12 text-center mt-6 border border-slate-100 dark:border-slate-850 w-full">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mx-auto mb-4 md:mb-6">
                <svg class="w-8 h-8 md:w-10 md:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h2 class="text-xl md:text-2xl font-bold mb-2">测试完成！</h2>
            <p id="final-score" class="text-sm md:text-base text-slate-500 dark:text-slate-400 mb-6 md:mb-8">你一共答对了 0 道题。</p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <button onclick="showHome()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl hover:bg-blue-700 transition font-medium text-sm md:text-base">返回主页章节</button>
                <button onclick="retryWrongOnes()" id="retry-wrong-btn" class="border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 px-6 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition font-medium text-sm md:text-base hidden">专门挑战本章错题</button>
            </div>
        </div>
    </main>

    <!-- 移动端底部自适应抽屉控制 -->
    <div id="mobile-fab" class="lg:hidden fixed bottom-6 right-4 z-30 flex flex-col space-y-3">
        <button onclick="finishSection()" class="p-3 bg-slate-800/90 dark:bg-slate-700/90 text-white hover:bg-red-500 dark:hover:bg-red-600 rounded-full shadow-lg transition duration-200 flex items-center justify-center border border-slate-700/50" aria-label="交卷">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
        </button>
        <button onclick="toggleMobileDrawer(true)" class="p-3 bg-blue-600 text-white rounded-full shadow-lg hover:bg-blue-700 transition duration-200 flex items-center justify-center border border-blue-500/50" id="fab-drawer-btn">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </div>

    <!-- 移动端抽屉遮罩 -->
    <div id="mobile-drawer-overlay" class="lg:hidden fixed inset-0 bg-slate-900/60 z-50 opacity-0 pointer-events-none transition-opacity duration-300" onclick="toggleMobileDrawer(false)">
        <div id="mobile-drawer" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-800 rounded-t-2xl p-5 max-h-[70vh] flex flex-col drawer-transition transform translate-y-full" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-4" onclick="toggleMobileDrawer(false)"></div>
            <div class="flex justify-between items-center mb-4">
                <span class="text-base font-bold text-slate-800 dark:text-white">本章进度答题卡</span>
                <button onclick="toggleMobileDrawer(false)" class="text-xs text-blue-600 dark:text-blue-400 font-bold">关闭</button>
            </div>
            <div id="answer-card-grid-mobile" class="grid grid-cols-5 gap-2.5 overflow-y-auto pr-1 pb-6 custom-scrollbar">
                <!-- 手机端题号格 -->
            </div>
        </div>
    </div>

    <script>
        // 234道临床分子生物学大纲核心题库分类
        const quizData = [
            {
                title: "第一章：基因组学与基础知识",
                questions: [
                    { q: "质粒的主要成分是", a: ["多糖", "蛋白质", "氨基酸衍生物", "脂类", "DNA 分子"], c: 4, desc: "质粒是细菌染色体外的双链环状DNA分子，具有自我复制能力。" },
                    { q: "病毒的遗传物质是", a: ["RNA和蛋白质", "DNA和蛋白质", "DNA 或RNA", "RNA和DNA", "DNA"], c: 2, desc: "病毒基因组多样，其遗传物质只能是DNA或者RNA中的一种。" },
                    { q: "人类可遗传变异中最简单、最常见的一种是", a: ["STR", "CNV", "RFLP", "SNP", "VNTR"], c: 3, desc: "SNP（单核苷酸多态性）是基因组中最简单、最常见的遗传变异形式。" },
                    { q: "在人类基因组 1 序列中, DNA 甲基化主要发生在", a: ["腺嘌呤的 N-6 位", "胞嘧啶的 N-4 位", "胞嘧啶的 C-5 位", "鸟嘌呤的 C-5 位", "鸟嘌呤的 N-7 位"], c: 2, desc: "哺乳动物中DNA甲基化主要发生在CpG双核苷酸的胞嘧啶C-5位上。" },
                    { q: "某基因位点正常时表达为精氨酸, 突变后为组氨酸, 这种突变方式为", a: ["同义突变", "错义突变", "无义突变", "移码突变", "动态突变"], c: 1, desc: "突变导致编码的氨基酸种类发生改变，称为错义突变。" },
                    { q: "原核生物基因组中没有", a: ["内含子", "外显子", "插入序列", "转录因子", "操纵子"], c: 0, desc: "原核生物基因组结构极其紧凑，没有真核生物特有的内含子结构。" },
                    { q: "下列叙述不正确的是", a: ["F 质粒的主要特征是带有耐药性基因", "F 和 Col E1 质粒可以在同一菌株内稳定共存", "Col 质粒可产生大肠杆菌素", "F 质粒是一种游离基因", "R 质粒又称抗药性质粒"], c: 0, desc: "控制细菌接合和性别的是F质粒，带有耐药性基因的是R（抗药性）质粒。" },
                    { q: "原核生物基因组的特征不包括", a: ["多为双链环状 DNA", "具有操纵子结构", "基因密度高", "存在大量的非编码序列", "转录与翻译偶联进行"], c: 3, desc: "原核生物基因组转录区极其紧密，基本不含有大量的重复非编码基因序列。" },
                    { q: "真核生物基因组的非编码序列不包括", a: ["内含子", "启动子", "外显子", "端粒 DNA", "高度重复序列"], c: 2, desc: "外显子（Exon）是真核生物基因组中的编码基因片段，最终会被转录翻译为蛋白质。" },
                    { q: "染色质的基本结构单位是", a: ["核小体", "螺线管", "超螺旋管", "染色单体", "DNA 双螺旋"], c: 0, desc: "染色质最基本的结构单元是核小体，由DNA链盘绕组蛋白八聚体组成。" }
                ]
            },
            {
                title: "第二章：核酸提取与蛋白质纯化",
                questions: [
                    { q: "下列说法正确的是", a: ["用于提取核酸的石蜡切片需要先用二甲苯脱蜡", "组织样本不需蛋白酶K消化即可进行核酸提取", "新鲜的组织样本需要先用二甲苯脱蜡才能进行核酸提取", "用于提取核酸的石蜡切片不需脱蜡即可进行核酸提取", "液状石蜡切片中缩短蛋白酶K的消化时间可增加提取DNA片段的长度"], c: 0, desc: "石蜡切片表面包裹有石蜡层，严重妨碍核酸裂解液的渗透，因此必须进行二甲苯脱蜡处理。" },
                    { q: "用于蛋白质检测的标本长期保存于", a: ["$8^{\\circ}C$", "$4^{\\circ}C$", "$-70^{\\circ}C$", "$-20^{\\circ}C$", "室温"], c: 2, desc: "用于蛋白质及酶活性测定的标本如果需要长期保存，通常储存于$-70^{\\circ}C$或更低的超低温冰箱中。" },

        // 滑动手势支持 (手机自测加速)
        function setupGestureDetection() {
            const swipeArea = document.getElementById('swipe-area');
            swipeArea.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1 && e.target.tagName !== 'INPUT') {
                    touchStartX = e.touches[0].screenX;
                } else {
                    touchStartX = 0;
                }
            }, { passive: true });

            swipeArea.addEventListener('touchend', (e) => {
                if (e.changedTouches.length === 1 && touchStartX !== 0) {
                    touchEndX = e.changedTouches[0].screenX;
                    const swipeThreshold = 65;
                    if (touchStartX - touchEndX > swipeThreshold) {
                        nextQuestion();
                    } else if (touchEndX - touchStartX > swipeThreshold) {
                        prevQuestion();
                    }
                }
            }, { passive: true });
        }

        // 填空模糊判定
        function isUserAnswerCorrect(chIdx, qIdx, ans) {
            if (ans === null || ans === undefined) return false;
            const ch = quizData[chIdx];
            const qData = ch.questions[qIdx];
            if (ch.isFill) {
                if (!Array.isArray(ans)) return false;
                return ans.every((userVal, idx) => {
                    const syns = qData.answers[idx];
                    const cleanedUser = (userVal || '').trim().toLowerCase().replace(/[-_－—\s/]/g, "");
                    return syns.some(syn => syn.toLowerCase().replace(/[-_－—\s/]/g, "") === cleanedUser);
                });
            } else {
                return ans === qData.c;
            }
        }

                overlay.classList.add('opacity-100');
                drawer.classList.remove('translate-y-full');
            } else {
                overlay.classList.add('opacity-0');
                drawer.classList.add('translate-y-full');
                setTimeout(() => overlay.classList.add('pointer-events-none'), 300);

                document.documentElement.classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('sun-icon').classList.add('hidden');
                document.getElementById('moon-icon').classList.remove('hidden');

                totalQuestions += ch.questions.length;
                const progressKey = `mol_bio_ch_${chIdx}_progress`;
                const progressData = localStorage.getItem(progressKey);
                if (progressData) {
                    try {
                        const parsed = JSON.parse(progressData);
                        parsed.userAns.forEach((ans, qIdx) => {
                            if (ans !== null) {
                                answeredQuestions++;
                                if (isUserAnswerCorrect(chIdx, qIdx, ans)) {
                                    correctAnswers++;
                                }
                            }
                        });
                    } catch (e) {}
                }
            });

            const progressPct = totalQuestions === 0 ? 0 : Math.round((answeredQuestions / totalQuestions) * 100);
            const accuracyPct = answeredQuestions === 0 ? 0 : Math.round((correctAnswers / answeredQuestions) * 100);

            document.getElementById('global-progress').innerText = `${progressPct}%`;
            document.getElementById('global-accuracy').innerText = `${accuracyPct}%`;
        }

                let totalChQ = ch.questions.length;
                const progressKey = `mol_bio_ch_${index}_progress`;
                const progressData = localStorage.getItem(progressKey);
                if (progressData) {
                    try {
                        const parsed = JSON.parse(progressData);
                        completedCount = parsed.userAns.filter(a => a !== null).length;
                        let chCorrect = 0;
                        parsed.userAns.forEach((ans, qI) => {
                            if (ans !== null && isUserAnswerCorrect(index, qI, ans)) chCorrect++;
                        });
                        chAccuracy = completedCount === 0 ? 0 : Math.round((chCorrect / completedCount) * 100);
                    } catch (e) {}
                }

                const card = document.createElement('div');
                card.className = "bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-850 rounded-2xl p-5 md:p-6 shadow-sm hover:shadow-md transition duration-300 flex flex-col justify-between group";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-2.5 py-1 rounded-full">Chapter 0${index + 1}</span>
                            <span class="text-[10px] text-slate-400">${completedCount}/${totalChQ} 已自测</span>
                        </div>
                        <h3 class="text-sm md:text-base font-bold text-slate-800 dark:text-slate-100 mb-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition leading-snug">${ch.title}</h3>
                        <div class="w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full mt-3 overflow-hidden">
                            <div class="bg-blue-600 h-full rounded-full transition-all duration-500" style="width: ${(completedCount/totalChQ)*100}%"></div>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-50 dark:border-slate-700 flex justify-between items-center font-semibold">
                        <span class="text-[10px] text-slate-400">正确率：<strong class="text-slate-700 dark:text-slate-300">${chAccuracy}%</strong></span>
                        <button onclick="startQuiz(${index})" class="px-4 py-1.5 bg-blue-600 text-white hover:bg-blue-700 text-[10px] md:text-xs font-bold rounded-lg shadow-sm transition">进入刷题</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // 单章进度重置
        function resetChapter() {
            if (confirm("确定要清空本章当前的答题记录，并重新开始自测吗？")) {
                const isCurrentFill = quizData[currentChapter].isFill;
                const total = quizData[currentChapter].questions.length;
                
                // 1. 清空当前内存答案
                userAnswers = new Array(total).fill(null);
                
                // 2. 清理对应错题本中当前章节的记录
                wrongBook = wrongBook.filter(item => item.chIdx !== currentChapter);
                localStorage.setItem('mol_bio_wrongs', JSON.stringify(wrongBook));
                updateWrongCount();

                // 3. 擦除本地存储的当章进度数据
                localStorage.removeItem(`mol_bio_ch_${currentChapter}_progress`);

                score = 0;
                currentIdx = 0;
                
                renderQuestion();
                renderAnswerCard();
                updateStats();
                updateGlobalStats();
            }
        }

        // 全局一键重置
        function resetAllProgress() {
            if (confirm("警告：确定要清空全部 10 个章节的自测数据和错题本吗？此操作不可逆！")) {
                quizData.forEach((_, index) => {
                    localStorage.removeItem(`mol_bio_ch_${index}_progress`);
                });
                localStorage.removeItem('mol_bio_wrongs');
                
                wrongBook = [];
                userAnswers = [];
                score = 0;
                currentIdx = 0;
                currentChapter = 0;
                
                updateWrongCount();
                showHome();
            }
        }

        // 开始章节练习
        function startQuiz(chIndex) {
            isWrongBookMode = false;
            currentChapter = chIndex;
            currentIdx = 0;
            score = 0;

            const total = quizData[chIndex].questions.length;
            userAnswers = new Array(total).fill(null);

            // 读档历史数据
            const progressKey = `mol_bio_ch_${chIndex}_progress`;
            const progressData = localStorage.getItem(progressKey);
            if (progressData) {
                try {
                    const parsed = JSON.parse(progressData);
                    userAnswers = parsed.userAns;
                    score = 0;
                    userAnswers.forEach((ans, idx) => {
                        if (isUserAnswerCorrect(chIndex, idx, ans)) score++;
                    });
                } catch(e) {}
            }

            // 针对填空题隐藏重置单章，自建填空重置
            document.getElementById('chapter-reset-btn').classList.remove('hidden');

            switchScreen('quiz-screen');
            renderQuestion();
            renderAnswerCard();
            updateStats();
        }

        // 渲染考题
        function renderQuestion() {
            let qData, qTitleText, totalQuestions;
            const isCurrentFill = isWrongBookMode ? quizData[wrongBook[currentIdx].chIdx].isFill : quizData[currentChapter].isFill;

            if (isWrongBookMode) {
                if (wrongBook.length === 0) {
                    showHome();
                    return;
                }
                const wrongItem = wrongBook[currentIdx];
                qData = quizData[wrongItem.chIdx].questions[wrongItem.qIdx];
                qTitleText = qData.q;
                totalQuestions = wrongBook.length;
                document.getElementById('category-tag').innerText = `错题重练 / ${quizData[wrongItem.chIdx].title}`;
            } else {
                const chapter = quizData[currentChapter];
                qData = chapter.questions[currentIdx];
                qTitleText = qData.q;
                totalQuestions = chapter.questions.length;
                document.getElementById('category-tag').innerText = chapter.title;
            }

            document.getElementById('progress-text').innerText = `第 ${currentIdx + 1} / ${totalQuestions} 题`;
            
            const container = document.getElementById('options-container');
            const analysisBox = document.getElementById('analysis-box');
            container.innerHTML = '';
            analysisBox.classList.add('hidden');

            if (isCurrentFill) {
                // --- 填空题渲染架构 ---
                document.getElementById('question-text').innerHTML = `根据语境，在横线上输入正确的专业词汇或数据：<br><br><div class="leading-loose select-text">${qTitleText}</div>`;
                const currentSelected = isWrongBookMode ? null : userAnswers[currentIdx];

                const inputs = document.querySelectorAll('.fill-blank-input');
                inputs.forEach(input => {
                    const idx = parseInt(input.getAttribute('data-idx'));
                    input.className = "fill-blank-input border-b-2 border-blue-500 dark:border-blue-400 bg-slate-50 dark:bg-slate-700/50 text-center outline-none px-2 py-1 mx-1 font-bold rounded-t-md transition-colors duration-200 w-44 inline-block focus:border-blue-600 focus:bg-blue-50/50 dark:focus:bg-slate-800 text-slate-800 dark:text-slate-100";
                    
                    if (currentSelected !== null) {
                        input.value = currentSelected[idx] || '';
                        input.disabled = true;
                        
                        const userVal = (currentSelected[idx] || '').trim();
                        const isCorrect = qData.answers[idx].some(syn => syn.toLowerCase().replace(/[-_－—\s/]/g, "") === userVal.toLowerCase().replace(/[-_－—\s/]/g, ""));
                        if (isCorrect) {
                            input.classList.add('fill-blank-correct', 'text-green-600', 'dark:text-green-400');
                        } else {
                            input.classList.add('fill-blank-wrong', 'text-red-600', 'dark:text-red-400');
                        }
                    } else {
                        input.placeholder = "在此键入作答";
                    }
                });

                if (currentSelected === null) {
                    const submitBtn = document.createElement('button');
                    submitBtn.className = "w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-all duration-150 mt-4";
                    submitBtn.innerText = "提交本次回答";
                    submitBtn.onclick = () => submitFillAnswer(inputs, qData);
                    container.appendChild(submitBtn);
                } else {
                    const answerBox = document.createElement('div');
                    answerBox.className = "p-4 bg-slate-50 dark:bg-slate-700/40 border border-slate-200 dark:border-slate-700 rounded-xl text-sm space-y-2 mt-4 select-text";
                    let correctHtml = `<div class="font-bold text-slate-500 dark:text-slate-400 mb-1">📖 官方推荐标准参考：</div>`;
                    qData.answers.forEach((ansList, idx) => {
                        correctHtml += `<div>空格 ${idx + 1}：<span class="text-green-600 dark:text-green-400 font-bold">${ansList[0]}</span> ${ansList.length > 1 ? `<span class="text-xs text-slate-400 font-normal">（可容错同义词：${ansList.slice(1).join('、')}）</span>` : ''}</div>`;
                    });
                    answerBox.innerHTML = correctHtml;
                    container.appendChild(answerBox);
                }

            } else {
                // --- 选择题渲染架构 ---
                document.getElementById('question-text').innerHTML = qTitleText;
                const alphabet = ['A', 'B', 'C', 'D', 'E'];
                const currentSelected = isWrongBookMode ? null : userAnswers[currentIdx];

                qData.a.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-left p-3.5 md:p-4 border border-slate-200 dark:border-slate-700/60 rounded-xl transition-all duration-150 flex items-start bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm md:text-base font-medium";
                    btn.innerHTML = `<span class="font-bold mr-3 text-slate-400 select-none">${alphabet[i]}.</span> <div class="flex-1">${opt}</div>`;

                    if (currentSelected !== null) {
                        btn.disabled = true;
                        if (i === qData.c) {
                            btn.classList.add('correct');
                        } else if (i === currentSelected) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        btn.onclick = () => selectOption(i);
                    }
                    container.appendChild(btn);
                });

                if (currentSelected !== null && qData.desc) {
                    analysisBox.classList.remove('hidden');
                    document.getElementById('analysis-text').innerText = qData.desc;
                }
            }

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerText = (currentIdx === totalQuestions - 1) ? '查看结果并交卷' : '下一题';

            updateStats();

            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // 提交填空
        function submitFillAnswer(inputs, qData) {
            const answers = [];
            let allCorrect = true;

            inputs.forEach(input => {
                const idx = parseInt(input.getAttribute('data-idx'));
                const userVal = input.value.trim();
                answers.push(userVal);

                const isCorrect = qData.answers[idx].some(syn => syn.toLowerCase().replace(/[-_－—\s/]/g, "") === userVal.toLowerCase().replace(/[-_－—\s/]/g, ""));
                if (!isCorrect) allCorrect = false;
            });

            if (isWrongBookMode) {
                // 错题本提交直接显示对错样式
                inputs.forEach(input => {
                    input.disabled = true;
                    const idx = parseInt(input.getAttribute('data-idx'));
                    const userVal = input.value.trim();
                    const isCorrect = qData.answers[idx].some(syn => syn.toLowerCase().replace(/[-_－—\s/]/g, "") === userVal.toLowerCase().replace(/[-_－—\s/]/g, ""));
                    if (isCorrect) {
                        input.classList.add('fill-blank-correct', 'text-green-600', 'dark:text-green-400');
                    } else {
                        input.classList.add('fill-blank-wrong', 'text-red-600', 'dark:text-red-400');
                    }
                });

                if (allCorrect) {
                    wrongBook.splice(currentIdx, 1);
                    localStorage.setItem('mol_bio_wrongs', JSON.stringify(wrongBook));
                    updateWrongCount();
                }

                setTimeout(() => {
                    if (wrongBook.length === 0) {
                        alert("太棒了！你已经斩断了所有错题！");
                        showHome();
                    } else {
                        if (currentIdx >= wrongBook.length) currentIdx = wrongBook.length - 1;
                        renderQuestion();
                    }
                }, 1200);

            } else {
                userAnswers[currentIdx] = answers;

                if (allCorrect) {
                    score++;
                } else {
                    addWrong(currentChapter, currentIdx);
                }

                const progressKey = `mol_bio_ch_${currentChapter}_progress`;
                localStorage.setItem(progressKey, JSON.stringify({ userAns: userAnswers }));

                renderQuestion();
                renderAnswerCard();

                if (currentIdx < quizData[currentChapter].questions.length - 1) {
                    setTimeout(nextQuestion, 1200);
                }
            }
        }

        // 选择单选选项
        function selectOption(optIndex) {
            if (isWrongBookMode) return;

            const qData = quizData[currentChapter].questions[currentIdx];
            userAnswers[currentIdx] = optIndex;

            if (optIndex === qData.c) {
                score++;
            } else {
                addWrong(currentChapter, currentIdx);
            }

            const progressKey = `mol_bio_ch_${currentChapter}_progress`;
            localStorage.setItem(progressKey, JSON.stringify({ userAns: userAnswers }));

            renderQuestion();
            renderAnswerCard();

            if (currentIdx < quizData[currentChapter].questions.length - 1) {
                setTimeout(nextQuestion, 800);
            }
        }

        // 答题卡渲染
        function renderAnswerCard() {
            if (isWrongBookMode) return;

            const total = quizData[currentChapter].questions.length;
            
            const makeCardButton = (i) => {
                const cell = document.createElement('button');
                cell.className = "w-full py-2.5 rounded-lg text-xs font-bold transition flex items-center justify-center border ";
                cell.innerText = i + 1;

                if (userAnswers[i] !== null) {
                    if (isUserAnswerCorrect(currentChapter, i, userAnswers[i])) {
                        cell.className += "bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/40 dark:text-emerald-300 dark:border-emerald-800";
                    } else {
                        cell.className += "bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/40 dark:text-rose-300 dark:border-rose-800";
                    }
                } else {
                    cell.className += "bg-slate-50 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700";
                }

                if (i === currentIdx) {
                    cell.className += " ring-2 ring-blue-500 ring-offset-2 dark:ring-offset-slate-900";
                }

                cell.onclick = () => {
                    currentIdx = i;
                    renderQuestion();
                    renderAnswerCard();
                    toggleMobileDrawer(false);
                };
                return cell;
            };

            const gridDesktop = document.getElementById('answer-card-grid-desktop');
            gridDesktop.innerHTML = '';
            for (let i = 0; i < total; i++) {
                gridDesktop.appendChild(makeCardButton(i));
            }

            const gridMobile = document.getElementById('answer-card-grid-mobile');
            gridMobile.innerHTML = '';
            for (let i = 0; i < total; i++) {
                gridMobile.appendChild(makeCardButton(i));
            }
        }

        // 添加错题
        function addWrong(chIdx, qIdx) {
            const exists = wrongBook.some(item => item.chIdx === chIdx && item.qIdx === qIdx);
            if (!exists) {
                wrongBook.push({ chIdx, qIdx });
                localStorage.setItem('mol_bio_wrongs', JSON.stringify(wrongBook));
                updateWrongCount();
            }
        }

        function updateWrongCount() {
            document.getElementById('wrong-count').innerText = wrongBook.length;
        }

        // 开启错题挑战
        function showWrongBook() {
            if (wrongBook.length === 0) {
                alert("错题本还是空的，非常完美！");
                return;
            }
            isWrongBookMode = true;
            currentIdx = 0;
            switchScreen('quiz-screen');
            document.getElementById('chapter-reset-btn').classList.add('hidden');
            renderQuestion();
            document.getElementById('answer-card-grid-desktop').innerHTML = '<div class="col-span-5 text-center text-xs text-slate-400 py-4">错题练习不启用静态答题卡</div>';
        }

        // 下一题与上一题跳转
        function nextQuestion() {
            const total = isWrongBookMode ? wrongBook.length : quizData[currentChapter].questions.length;
            if (currentIdx < total - 1) {
                currentIdx++;
                renderQuestion();
                renderAnswerCard();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
                renderAnswerCard();
            }
        }

        function updateStats() {
            const total = isWrongBookMode ? wrongBook.length : quizData[currentChapter].questions.length;
            const answeredCount = isWrongBookMode ? 0 : userAnswers.filter(a => a !== null).length;
            
            let rightCount = 0;
            if (!isWrongBookMode) {
                userAnswers.forEach((ans, idx) => {
                    if (ans !== null && isUserAnswerCorrect(currentChapter, idx, ans)) rightCount++;
                });
            }
            
            const currentAccuracy = answeredCount === 0 ? 0 : Math.round((rightCount / answeredCount) * 100);
            document.getElementById('accuracy').innerText = `${currentAccuracy}%（已答 ${rightCount}/${answeredCount}）`;
        }

        // 自测结算交卷
        function finishSection() {
            if (confirm("确定要结束当前的练习并查看成果吗？")) {
                showResult();
            }
        }

        function showResult() {
            toggleMobileDrawer(false);
            switchScreen('result-screen');
            
            if (isWrongBookMode) {
                document.getElementById('final-score').innerText = `错题集突击结束！目前错题库中还留有 ${wrongBook.length} 道题目。`;
                document.getElementById('retry-wrong-btn').classList.add('hidden');
                return;
            }

            const total = quizData[currentChapter].questions.length;
            let finalRight = 0;
            let answered = 0;
            userAnswers.forEach((ans, idx) => {
                if (ans !== null) {
                    answered++;
                    if (isUserAnswerCorrect(currentChapter, idx, ans)) finalRight++;
                }
            });

            document.getElementById('final-score').innerText = `本章总题数：${total}，你完成了 ${answered} 题。其中答对 ${finalRight} 题，答错 ${answered - finalRight} 题。本章最终正确率：${answered === 0 ? 0 : Math.round(finalRight/answered*100)}%`;
            
            const wrongOnesInCh = userAnswers.map((ans, idx) => (ans !== null && !isUserAnswerCorrect(currentChapter, idx, ans)) ? idx : null).filter(v => v !== null);
            
            if (wrongOnesInCh.length > 0) {
                document.getElementById('retry-wrong-btn').classList.remove('hidden');
            } else {
                document.getElementById('retry-wrong-btn').classList.add('hidden');
            }
        }

        function retryWrongOnes() {
            const chWrongs = wrongBook.filter(item => item.chIdx === currentChapter);
            if (chWrongs.length === 0) {
                alert("太棒了！本章节你已经没有任何错题记录。");
                showHome();
                return;
            }
            isWrongBookMode = true;
            currentIdx = 0;
            switchScreen('quiz-screen');
            document.getElementById('chapter-reset-btn').classList.add('hidden');
            renderQuestion();
        }

        function showHome() {
            isWrongBookMode = false;
            switchScreen('home-screen');
            renderChapterList();
            updateGlobalStats();
        }

        function switchScreen(screenId) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');

            document.getElementById(screenId).classList.remove('hidden');
            
            if (screenId === 'quiz-screen') {
                document.getElementById('mobile-fab').classList.remove('hidden');
            } else {
                document.getElementById('mobile-fab').classList.add('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = init;
    </script>
</body>
</html>
